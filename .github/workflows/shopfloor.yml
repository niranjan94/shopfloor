          base_allowed_tools: "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git show:*),${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1.0.88 -- pinned; v1.0.89+ bug: anthropics/claude-code-action#1205
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          # The Shopfloor GitHub App is the actor that triggers downstream
          # stages, so every claude-code-action invocation past triage sees a
          # Bot actor. Allow all bots so the action does not refuse to run.
          allowed_bots: "*"
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          claude_args: |
            --model ${{ inputs.review_smells_model }}
            --effort ${{ inputs.review_smells_effort }}
            ${{ inputs.review_smells_max_turns != '' && format('--max-turns {0}', inputs.review_smells_max_turns) || '' }}
            ${{ inputs.review_smells_max_budget_usd != '' && format('--max-budget-usd {0}', inputs.review_smells_max_budget_usd) || '' }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["clean","issues_found"]},"summary":{"type":"string"},"comments":{"type":"array","items":{"type":"object","properties":{"path":{"type":"string"},"line":{"type":"integer"},"side":{"type":"string","enum":["LEFT","RIGHT"]},"start_line":{"type":"integer"},"start_side":{"type":"string","enum":["LEFT","RIGHT"]},"body":{"type":"string"},"confidence":{"type":"integer"},"category":{"type":"string"}},"required":["path","line","side","body","confidence","category"]}}},"required":["verdict","summary","comments"]}'

  review-aggregator:
    needs:
      [
        route,
        review-skip-check,
        review-compliance,
        review-bugs,
        review-security,
        review-smells,
      ]
    if: always() && needs.route.outputs.stage == 'review' && needs.review-skip-check.outputs.skip == 'false' && needs.route.outputs.has_review_app == 'true'
    # SHA-scoped so duplicate review events (synchronize + ready_for_review
    # on the same push) cancel each other; different SHAs run independently
    # and aggregateReview's in-helper analysedSha drift check handles stale
    # SHAs. Replaces the earlier shopfloor-implement-<issue> shared group.
    concurrency:
      group: shopfloor-review-aggregator-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
      cancel-in-progress: true
    runs-on: ${{ startsWith(inputs.runner_router, '[') && fromJSON(inputs.runner_router) || inputs.runner_router }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Primary Shopfloor App token. Covers everything except postReview:
      # labels, issue comments, commit statuses, PR body edits all run under
      # the main App's identity (the PR author).
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      # SECOND App token, used ONLY for the createReview call inside
      # aggregate-review. The review App is a distinct identity from the PR
      # author, so REQUEST_CHANGES / APPROVE succeed without tripping
      # GitHub's self-review block. Because the reviewer is an App (not
      # GITHUB_TOKEN), the resulting pull_request_review.submitted event
      # still fires the router and drives the revision loop.
      - name: Mint GitHub App token (review app)
        id: app_token_review
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_review_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_review_private_key }}
      - name: Precheck review preconditions
        id: precheck
        uses: niranjan94/shopfloor/router@main
        with:
          helper: precheck-stage
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          stage: review-aggregator
          issue_number: ${{ needs.route.outputs.issue_number }}
          pr_number: ${{ needs.route.outputs.impl_pr_number }}
          analysed_sha: ${{ github.event.pull_request.head.sha }}
      - name: Log precheck skip
        if: steps.precheck.outputs.skip == 'true'
        run: echo "::notice title=Shopfloor review skipped::${{ steps.precheck.outputs.reason }}"
      - name: Aggregate review
        id: aggregate
        uses: niranjan94/shopfloor/router@main
        if: steps.precheck.outputs.skip != 'true'
        with:
          helper: aggregate-review
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          review_github_token: ${{ steps.app_token_review.outputs.token }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          pr_number: ${{ needs.route.outputs.impl_pr_number }}
          confidence_threshold: ${{ inputs.review_confidence_threshold }}
          max_iterations: ${{ inputs.max_review_iterations }}
          compliance_output: ${{ needs.review-compliance.outputs.structured_output }}
          bugs_output: ${{ needs.review-bugs.outputs.structured_output }}
          security_output: ${{ needs.review-security.outputs.structured_output }}
          smells_output: ${{ needs.review-smells.outputs.structured_output }}
          workflow_run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          analysed_sha: ${{ github.event.pull_request.head.sha }}
      - name: Report failure
        # Only the aggregate-review step itself failing counts as a "review
        # failed" condition worth labelling the issue for. Matrix job
        # crashes propagate via aggregate-review's missing-output handling
        # and surface as a "review-stuck" decision, not a failure.
        if: failure() && steps.aggregate.outcome == 'failure'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: report-failure
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: review
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          target_pr_number: ${{ needs.route.outputs.impl_pr_number }}

  handle-merge:
    needs: route
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && startsWith(needs.route.outputs.reason, 'pr_merged_')
    concurrency:
      group: shopfloor-implement-${{ needs.route.outputs.issue_number }}
      cancel-in-progress: false
    runs-on: ${{ startsWith(inputs.runner_router, '[') && fromJSON(inputs.runner_router) || inputs.runner_router }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: parse_merged_stage
        run: |
          reason='${{ needs.route.outputs.reason }}'
          stage="${reason#pr_merged_}"
          stage="${stage%_triggered_label_flip}"
          echo "merged_stage=$stage" >> "$GITHUB_OUTPUT"
      # Mint a GitHub App token so the label flip below (spec-merged to needs-plan,
      # plan-merged to needs-impl) actually triggers the next stage's workflow run.
      # secrets.GITHUB_TOKEN cannot trigger downstream workflows.
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Precheck handle-merge preconditions
        id: precheck
        uses: niranjan94/shopfloor/router@main
        with:
          helper: precheck-stage
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          stage: handle-merge
          issue_number: ${{ needs.route.outputs.issue_number }}
          merged_stage: ${{ steps.parse_merged_stage.outputs.merged_stage }}
      - name: Log precheck skip
        if: steps.precheck.outputs.skip == 'true'
        run: echo "::notice title=Shopfloor handle-merge skipped::${{ steps.precheck.outputs.reason }}"
      - uses: niranjan94/shopfloor/router@main
        if: steps.precheck.outputs.skip != 'true'
        with:
          helper: handle-merge
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          merged_stage: ${{ steps.parse_merged_stage.outputs.merged_stage }}
          pr_number: ${{ github.event.pull_request.number }}
