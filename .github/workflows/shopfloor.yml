        if: ${{ success() && steps.app_token.outputs.token != '' && steps.precheck.outputs.skip != 'true' }}
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"
      - name: Commit and push plan
        if: success() && steps.precheck.outputs.skip != 'true'
        run: |
          git add "${{ needs.route.outputs.plan_file_path }}"
          git commit -m "docs(plan): add ${{ needs.route.outputs.plan_file_path }}"
          # Force-push to overwrite any stale branch from a previous failed run.
          git push -u origin "${{ needs.route.outputs.branch_name }}" --force
      - name: Open plan PR
        if: success() && steps.precheck.outputs.skip != 'true'
        id: open_pr
        uses: niranjan94/shopfloor/router@main
        with:
          helper: open-stage-pr
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: plan
          branch_name: ${{ needs.route.outputs.branch_name }}
          base_branch: ${{ github.event.repository.default_branch }}
          pr_title: ${{ fromJSON(steps.agent.outputs.structured_output).pr_title }}
          pr_body: ${{ fromJSON(steps.agent.outputs.structured_output).pr_body }}
      - name: Advance state to plan-in-review
        if: success() && steps.precheck.outputs.skip != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: advance-state
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: shopfloor:needs-plan,shopfloor:plan-running
          to_labels: shopfloor:plan-in-review
      - name: Report failure
        if: failure() && steps.precheck.outputs.skip != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: report-failure
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: plan
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  implement:
    needs: route
    if: needs.route.outputs.stage == 'implement'
    concurrency:
      group: shopfloor-implement-${{ needs.route.outputs.issue_number }}
      cancel-in-progress: false
    runs-on: ${{ inputs.runner_impl != '' && (startsWith(inputs.runner_impl, '[') && fromJSON(inputs.runner_impl) || inputs.runner_impl) || (startsWith(inputs.runner_agent, '[') && fromJSON(inputs.runner_agent) || inputs.runner_agent) }}
    timeout-minutes: ${{ inputs.impl_timeout_minutes }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      comment_id: ${{ steps.progress.outputs.comment_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # The impl job mints App tokens in two phases. The PRE token covers
      # everything before the agent runs: the initial branch push, the draft
      # PR, the progress comment, the context builder's gh api call, and
      # render-prompt. The PUSH token (minted later, after the agent) covers
      # the post-agent push, the ready_for_review un-draft, the progress
      # finalize, and the postwork label flip. Two mints are needed because
      # the impl agent can run up to 60 minutes, longer than the 1-hour App
      # installation token lifetime, so the post-agent token is freshly
      # minted right when it is needed. Only claude-code-action itself stays
      # on secrets.GITHUB_TOKEN because its subprocess may run past both.
      - name: Mint pre-agent GitHub App token
        id: app_token_pre
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Reconfigure git remote with pre-agent App token
        if: ${{ steps.app_token_pre.outputs.token != '' }}
        env:
          APP_TOKEN: ${{ steps.app_token_pre.outputs.token }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"
      - name: Precheck implement preconditions
        id: precheck
        uses: niranjan94/shopfloor/router@main
        with:
          helper: precheck-stage
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          stage: implement
          issue_number: ${{ needs.route.outputs.issue_number }}
      - name: Log precheck skip
        if: steps.precheck.outputs.skip == 'true'
        run: echo "::notice title=Shopfloor implement skipped::${{ steps.precheck.outputs.reason }}"
      - name: Mark implement as running
        if: steps.precheck.outputs.skip != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: advance-state
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: ""
          to_labels: shopfloor:implementing
      - name: Create impl branch
        if: steps.precheck.outputs.skip != 'true' && needs.route.outputs.revision_mode != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ needs.route.outputs.branch_name }}"
          # An empty commit is required so the draft PR opened below has at least
          # one commit difference from the base branch (GitHub rejects zero-commit
          # PRs with "No commits between main and <branch>"). The agent's real
          # commits will stack on top and this placeholder can be squashed away
          # at merge time.
          git commit --allow-empty -m "chore(shopfloor): init impl branch for #${{ needs.route.outputs.issue_number }}"
          # Force-push to overwrite any stale branch left by a previous failed
          # run. Shopfloor owns impl branches outright and retries (which only
          # happen when a human clears the shopfloor:failed:* label) explicitly
          # opt into discarding whatever was there before.
          git push -u origin "${{ needs.route.outputs.branch_name }}" --force
      # Revision runs: the impl branch already exists on the remote from the
      # previous iteration. Fetch it into a local ref so subsequent steps see
      # the same working tree the prior implement run left behind. No
      # `git checkout -b` (the branch exists) and no empty bootstrap commit
      # (the PR already has real history).
      - name: Checkout existing impl branch
        if: steps.precheck.outputs.skip != 'true' && needs.route.outputs.revision_mode == 'true'
        env:
          BRANCH_NAME: ${{ needs.route.outputs.branch_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${BRANCH_NAME}"
          git checkout -B "${BRANCH_NAME}" FETCH_HEAD
      - id: open_pr
        if: steps.precheck.outputs.skip != 'true' && needs.route.outputs.revision_mode != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: open-stage-pr
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: implement
          branch_name: ${{ needs.route.outputs.branch_name }}
          base_branch: ${{ github.event.repository.default_branch }}
          # Placeholder title using the raw issue title. apply-impl-postwork
          # rewrites both title and body with the agent's Conventional Commits
          # structured output once the agent finishes. Draft status signals WIP.
          pr_title: "wip: ${{ github.event.issue.title }} (#${{ needs.route.outputs.issue_number }})"
          pr_body: |
            Shopfloor is implementing issue #${{ needs.route.outputs.issue_number }} now. The title and body will be rewritten with the agent's final summary when work completes. Follow live progress in the Shopfloor comment below.

            Tracking: #${{ needs.route.outputs.issue_number }}
          draft: ${{ inputs.use_draft_prs && 'true' || 'false' }}
      - name: Add WIP label to impl PR
        if: ${{ steps.precheck.outputs.skip != 'true' && needs.route.outputs.revision_mode != 'true' && !inputs.use_draft_prs }}
        env:
          GH_TOKEN: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.open_pr.outputs.pr_number }}
          REPO_SLUG: ${{ github.repository }}
        run: gh pr edit "$PR_NUMBER" --repo "$REPO_SLUG" --add-label "shopfloor:wip"
      # Revision runs reuse the existing impl PR rather than opening a new
      # one. Re-emit the route job's impl_pr_number as a step output so the
      # unified resolver below can feed it to downstream consumers without
      # colliding with the first-run `open_pr` step id.
      - name: Resolve existing impl PR number
        id: open_pr_revision
        if: steps.precheck.outputs.skip != 'true' && needs.route.outputs.revision_mode == 'true'
        env:
          PR_NUMBER: ${{ needs.route.outputs.impl_pr_number }}
        run: |
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
      # Collapse the first-run and revision PR-number sources into one
      # canonical step output so downstream steps never need to know which
      # path produced the number. Whichever of the two steps above actually
      # ran will have populated its respective env var here; the other is
      # empty because its step was skipped.
      - name: Resolve unified impl PR number
        id: pr
        if: steps.precheck.outputs.skip != 'true'
        env:
          FROM_FIRST_RUN: ${{ steps.open_pr.outputs.pr_number }}
          FROM_REVISION: ${{ steps.open_pr_revision.outputs.pr_number }}
        run: |
          if [ -n "$FROM_FIRST_RUN" ]; then
            echo "pr_number=$FROM_FIRST_RUN" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$FROM_REVISION" >> "$GITHUB_OUTPUT"
          fi
      - name: Add WIP label to impl PR (revision)
        if: ${{ steps.precheck.outputs.skip != 'true' && needs.route.outputs.revision_mode == 'true' && !inputs.use_draft_prs }}
        env:
          GH_TOKEN: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          REPO_SLUG: ${{ github.repository }}
        run: gh pr edit "$PR_NUMBER" --repo "$REPO_SLUG" --add-label "shopfloor:wip"
      - id: progress
        if: steps.precheck.outputs.skip != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: create-progress-comment
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          pr_number: ${{ steps.pr.outputs.pr_number }}
      - name: Write Shopfloor MCP config
        if: steps.precheck.outputs.skip != 'true'
        id: mcp_config
        env:
          MCP_CONFIG_PATH: ${{ runner.temp }}/shopfloor-mcp.json
        run: |
          cat > "$MCP_CONFIG_PATH" <<EOF
          {
            "mcpServers": {
              "shopfloor": {
                "command": "bun",
                "args": ["run", "mcp-servers/shopfloor-mcp/index.ts"],
                "env": {
                  "SHOPFLOOR_GITHUB_APP_CLIENT_ID": "${{ secrets.shopfloor_github_app_client_id }}",
                  "SHOPFLOOR_GITHUB_APP_PRIVATE_KEY": ${{ toJSON(secrets.shopfloor_github_app_private_key) }},
                  "GITHUB_TOKEN": "${{ secrets.GITHUB_TOKEN }}",
                  "REPO_OWNER": "${{ github.repository_owner }}",
                  "REPO_NAME": "${{ github.event.repository.name }}",
                  "SHOPFLOOR_COMMENT_ID": "${{ steps.progress.outputs.comment_id }}",
                  "GITHUB_API_URL": "${{ github.api_url }}"
                }
              }
            }
          }
          EOF
          # claude-code-action does not shell-expand values in claude_args, so
          # we must pass an already-resolved absolute path via ${{ runner.temp }}
          # instead of $RUNNER_TEMP. Fail loudly now if the file is missing so
          # we don't silently feed Claude an unreadable --mcp-config path.
          if [ ! -s "$MCP_CONFIG_PATH" ]; then
            echo "::error title=Shopfloor::MCP config not written at $MCP_CONFIG_PATH" >&2
            exit 1
          fi
          echo "path=$MCP_CONFIG_PATH" >> "$GITHUB_OUTPUT"
      - name: Build implement context
        if: steps.precheck.outputs.skip != 'true' && needs.route.outputs.revision_mode != 'true'
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          BRANCH_NAME: ${{ needs.route.outputs.branch_name }}
          SPEC_FILE_PATH: ${{ needs.route.outputs.spec_file_path }}
          PLAN_FILE_PATH: ${{ needs.route.outputs.plan_file_path }}
          COMPLEXITY: ${{ needs.route.outputs.complexity }}
          PROGRESS_COMMENT_ID: ${{ steps.progress.outputs.comment_id }}
          BASH_ALLOWLIST: ${{ inputs.impl_bash_allowlist }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          if ! ISSUE_COMMENTS=$(gh api --paginate "repos/$REPO_OWNER/$REPO_NAME/issues/$ISSUE_NUMBER/comments" --jq '[.[] | "**@\(.user.login)** (\(.created_at)):\n\(.body)"] | join("\n\n---\n\n")' 2>/dev/null); then
            echo "Warning: failed to fetch issue comments for #$ISSUE_NUMBER" >&2
            ISSUE_COMMENTS=""
          fi
          # Prompts now use @path references to read spec/plan files on
          # demand. Pass paths, not contents.
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg issue_comments "$ISSUE_COMMENTS" \
            --arg spec_file_path "$SPEC_FILE_PATH" \
            --arg plan_file_path "$PLAN_FILE_PATH" \
            --arg branch_name "$BRANCH_NAME" \
            --arg progress_comment_id "$PROGRESS_COMMENT_ID" \
            --arg revision_block "" \
            --arg bash_allowlist "$BASH_ALLOWLIST" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, issue_comments: $issue_comments, spec_file_path: $spec_file_path, plan_file_path: $plan_file_path, branch_name: $branch_name, progress_comment_id: $progress_comment_id, revision_block: $revision_block, bash_allowlist: $bash_allowlist, repo_owner: $repo_owner, repo_name: $repo_name}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      # Revision runs build the implement context via a dedicated helper
      # instead of inline jq. The helper fetches the latest REQUEST_CHANGES
      # review and its line-level comments, renders the revision fragment,
      # and writes a context.json with the same shape as the first-run
      # builder plus a populated revision_block.
      - name: Build revision context
        id: ctx_revision
        if: steps.precheck.outputs.skip != 'true' && needs.route.outputs.revision_mode == 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: build-revision-context
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          pr_number: ${{ needs.route.outputs.impl_pr_number }}
          branch_name: ${{ needs.route.outputs.branch_name }}
          spec_file_path: ${{ needs.route.outputs.spec_file_path }}
          plan_file_path: ${{ needs.route.outputs.plan_file_path }}
          progress_comment_id: ${{ steps.progress.outputs.comment_id }}
          bash_allowlist: ${{ inputs.impl_bash_allowlist }}
          repo_owner: ${{ github.repository_owner }}
          repo_name: ${{ github.event.repository.name }}
          output_path: ${{ runner.temp }}/context.json
      # Collapse the first-run and revision context paths into one output
      # so the downstream render-prompt step has a single source regardless
      # of which builder actually ran.
      - name: Resolve unified context path
        id: ctx_path
        if: steps.precheck.outputs.skip != 'true'
        env:
          FROM_FIRST_RUN: ${{ steps.ctx.outputs.path }}
          FROM_REVISION: ${{ steps.ctx_revision.outputs.path }}
        run: |
          if [ -n "$FROM_FIRST_RUN" ]; then
            echo "path=$FROM_FIRST_RUN" >> "$GITHUB_OUTPUT"
          else
            echo "path=$FROM_REVISION" >> "$GITHUB_OUTPUT"
          fi
      # Quick issues have no plan to follow and should not invoke
      # superpowers:subagent-driven-development. They get a dedicated
      # one-shot prompt and skip the superpowers plugin load entirely.
      # Medium and large both invoke the plan-driven implement prompt,
      # which in turn invokes subagent-driven-development.
      - name: Choose implement prompt and plugins
        if: steps.precheck.outputs.skip != 'true'
        id: impl_choice
        env:
          COMPLEXITY: ${{ needs.route.outputs.complexity }}
        run: |
          # Empty plugins value for quick is captured via a step output here
          # rather than an inline template ternary, because GitHub Actions
          # expression short-circuiting treats the empty string as falsy, so
          # the naive ternary would silently fall through to the non-empty
          # branch and the plugin would load anyway.
          if [ "$COMPLEXITY" = "quick" ]; then
            echo "prompt_file=prompts/implement-quick.md" >> "$GITHUB_OUTPUT"
            echo "plugins=" >> "$GITHUB_OUTPUT"
          else
            echo "prompt_file=prompts/implement.md" >> "$GITHUB_OUTPUT"
            echo "plugins=superpowers@claude-plugins-official" >> "$GITHUB_OUTPUT"
          fi
      - name: Render implement prompt
        if: steps.precheck.outputs.skip != 'true'
        id: prompt
        uses: niranjan94/shopfloor/router@main
        with:
          helper: render-prompt
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          prompt_file: ${{ steps.impl_choice.outputs.prompt_file }}
          context_file: ${{ steps.ctx_path.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,Edit,Write,Bash(${{ inputs.impl_bash_allowlist }}),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git add:*),Bash(git commit:*),Bash(git status:*),Bash(git rev-parse:*),WebFetch,mcp__shopfloor__update_progress,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        if: steps.precheck.outputs.skip != 'true'
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1.0.88 -- pinned; v1.0.89+ bug: anthropics/claude-code-action#1205
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          # The Shopfloor GitHub App is the actor that triggers downstream
          # stages, so every claude-code-action invocation past triage sees a
          # Bot actor. Allow all bots so the action does not refuse to run.
          allowed_bots: "*"
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          plugins: ${{ steps.impl_choice.outputs.plugins }}
          claude_args: |
            --model ${{ inputs.impl_model }}
            --effort ${{ inputs.impl_effort }}
            ${{ inputs.impl_max_turns != '' && format('--max-turns {0}', inputs.impl_max_turns) || '' }}
            ${{ inputs.impl_max_budget_usd != '' && format('--max-budget-usd {0}', inputs.impl_max_budget_usd) || '' }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
            --mcp-config ${{ steps.mcp_config.outputs.path }}
            --json-schema '{"type":"object","properties":{"pr_title":{"type":"string"},"pr_body":{"type":"string"},"summary_for_issue_comment":{"type":"string"},"changed_files":{"type":"array","items":{"type":"string"}}},"required":["pr_title","pr_body","summary_for_issue_comment","changed_files"]}'
      # Mint a FRESH GitHub App token here (not at job start). The impl agent can
      # run for up to impl_timeout_minutes (default 60), which exceeds the 1-hour
      # lifetime of an installation token. Minting after the agent guarantees the
      # push below has a full hour of token validity, and the push event (which
      # becomes pull_request.synchronize) triggers the review matrix. Events
      # caused by secrets.GITHUB_TOKEN are suppressed by GitHub, so the review
      # matrix would never fire without this.
      - name: Mint post-agent GitHub App token
        id: app_token_post
        if: ${{ success() && env.SHOPFLOOR_HAS_APP == 'true' && steps.precheck.outputs.skip != 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Reconfigure git remote with App token for push
        if: ${{ success() && steps.app_token_post.outputs.token != '' && steps.precheck.outputs.skip != 'true' }}
        env:
          APP_TOKEN: ${{ steps.app_token_post.outputs.token }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"
      - name: Push impl commits
        if: success() && steps.precheck.outputs.skip != 'true'
        run: git push origin "${{ needs.route.outputs.branch_name }}"
      # The impl PR was opened as a draft (or had shopfloor:wip applied)
      # so nothing reviews it mid-run. Now that the agent has finished and
      # the final commits are pushed, either un-draft the PR or remove the
      # WIP label, depending on the use_draft_prs input. This fires
      # pull_request.ready_for_review (draft mode) or
      # pull_request.unlabeled (WIP mode), which the state machine
      # translates into stage=review.
      # Only first runs need to un-draft the PR; on revision runs the PR
      # is already ready-for-review. The WIP label removal runs on both
      # first and revision runs since the label is added at the start of
      # every run.
      - name: Mark impl PR ready for review
        if: ${{ success() && steps.app_token_post.outputs.token != '' && steps.precheck.outputs.skip != 'true' && needs.route.outputs.revision_mode != 'true' && inputs.use_draft_prs }}
        env:
          GH_TOKEN: ${{ steps.app_token_post.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          REPO_SLUG: ${{ github.repository }}
        run: gh pr ready "$PR_NUMBER" --repo "$REPO_SLUG"
      # WIP-label equivalent of the draft -> ready transition above.
      # Runs on BOTH first and revision runs (no revision_mode gate).
      # Must use the App token: events from GITHUB_TOKEN are suppressed
      # and the unlabeled event is the review trigger in non-draft mode.
      - name: Remove WIP label from impl PR
        if: ${{ success() && steps.app_token_post.outputs.token != '' && steps.precheck.outputs.skip != 'true' && !inputs.use_draft_prs }}
        env:
          GH_TOKEN: ${{ steps.app_token_post.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          REPO_SLUG: ${{ github.repository }}
        run: gh pr edit "$PR_NUMBER" --repo "$REPO_SLUG" --remove-label "shopfloor:wip"
      - name: Finalize progress comment
        if: always() && steps.precheck.outputs.skip != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: finalize-progress-comment
          github_token: ${{ steps.app_token_post.outputs.token || secrets.GITHUB_TOKEN }}
          comment_id: ${{ steps.progress.outputs.comment_id }}
          terminal_state: ${{ job.status == 'success' && 'success' || 'failure' }}
          final_body: ${{ steps.agent.outputs.structured_output && fromJSON(steps.agent.outputs.structured_output).summary_for_issue_comment || 'Implementation ended with errors.' }}
      - name: Apply impl postwork (update PR, flip labels)
        if: success() && steps.precheck.outputs.skip != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: apply-impl-postwork
          github_token: ${{ steps.app_token_post.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          pr_number: ${{ steps.pr.outputs.pr_number }}
          pr_title: ${{ fromJSON(steps.agent.outputs.structured_output).pr_title }}
          pr_body: ${{ fromJSON(steps.agent.outputs.structured_output).pr_body }}
          # Every review-stage job is gated on this flag (set by the route
          # job from the SHOPFLOOR_GITHUB_APP_REVIEW_* secrets). Without it,
          # routing to shopfloor:needs-review would strand the issue in
          # permanent review purgatory because no review job would ever
          # fire. The helper short-circuits to impl-in-review in that case.
          has_review_app: ${{ needs.route.outputs.has_review_app }}
      - name: Report failure
