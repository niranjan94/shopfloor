name: Shopfloor
on:
  workflow_call:
    inputs:
      triage_model: { type: string, default: sonnet }
      spec_model: { type: string, default: opus }
      plan_model: { type: string, default: opus }
      impl_model: { type: string, default: opus }
      # Turn budgets. Empty string (default) means no --max-turns flag is
      # passed to claude-code-action, which leaves the agent uncapped and
      # bounded only by the corresponding *_timeout_minutes wall-clock.
      triage_max_turns: { type: string, default: "" }
      spec_max_turns: { type: string, default: "" }
      plan_max_turns: { type: string, default: "" }
      impl_max_turns: { type: string, default: "" }
      # Dollar budget per agent run. Empty string (default) means no
      # --max-budget-usd flag is passed. Set to a numeric string (e.g. "2.50")
      # to cap the spend of an individual agent invocation.
      triage_max_budget_usd: { type: string, default: "" }
      spec_max_budget_usd: { type: string, default: "" }
      plan_max_budget_usd: { type: string, default: "" }
      impl_max_budget_usd: { type: string, default: "" }
      triage_timeout_minutes: { type: number, default: 10 }
      spec_timeout_minutes: { type: number, default: 20 }
      plan_timeout_minutes: { type: number, default: 30 }
      impl_timeout_minutes: { type: number, default: 60 }
      branch_prefix: { type: string, default: "shopfloor/" }
      artifacts_dir: { type: string, default: "docs/shopfloor/" }
      impl_bash_allowlist:
        type: string
        default: "pnpm install,pnpm test:*,pnpm lint:*,pnpm build,pnpm exec tsc"
      additional_tools: { type: string, default: "" }
      review_compliance_model: { type: string, default: sonnet }
      review_bugs_model: { type: string, default: opus }
      review_security_model: { type: string, default: opus }
      review_smells_model: { type: string, default: opus }
      review_compliance_max_turns: { type: string, default: "" }
      review_bugs_max_turns: { type: string, default: "" }
      review_security_max_turns: { type: string, default: "" }
      review_smells_max_turns: { type: string, default: "" }
      review_compliance_max_budget_usd: { type: string, default: "" }
      review_bugs_max_budget_usd: { type: string, default: "" }
      review_security_max_budget_usd: { type: string, default: "" }
      review_smells_max_budget_usd: { type: string, default: "" }
      review_compliance_enabled: { type: boolean, default: true }
      review_bugs_enabled: { type: boolean, default: true }
      review_security_enabled: { type: boolean, default: true }
      review_smells_enabled: { type: boolean, default: true }
      review_timeout_minutes: { type: number, default: 20 }
      review_confidence_threshold: { type: number, default: 80 }
      max_review_iterations: { type: number, default: 3 }
      use_bedrock: { type: boolean, default: false }
      use_vertex: { type: boolean, default: false }
      use_foundry: { type: boolean, default: false }
      ssh_signing_key_enabled: { type: boolean, default: false }
      keep_artifacts_forever: { type: boolean, default: true }
      # When set, Shopfloor only enters the pipeline for issues that carry this label.
      # Issues already mid-pipeline (any shopfloor:* state label) are grandfathered in,
      # so removing the trigger label later does not strand in-flight work.
      # Leave empty to run on every new issue.
      trigger_label: { type: string, default: "" }
      # Effort per stage. Passed as `--effort` to claude-code-action.
      # High for design-heavy stages (spec, plan); medium for everything else as a sane default.
      triage_effort: { type: string, default: medium }
      spec_effort: { type: string, default: high }
      plan_effort: { type: string, default: high }
      impl_effort: { type: string, default: medium }
      review_compliance_effort: { type: string, default: medium }
      review_bugs_effort: { type: string, default: medium }
      review_security_effort: { type: string, default: medium }
      review_smells_effort: { type: string, default: medium }
      # Whether claude-code-action should post its own "display report" comment on the PR/issue.
      # Shopfloor's helpers handle all user-facing reporting, so this is on by default as a
      # transparency aid but can be flipped globally here. Pass the literal string 'true' or 'false';
      # claude-code-action expects a string, not a workflow boolean.
      display_report: { type: string, default: "true" }
      use_draft_prs:
        type: boolean
        default: true
        description: >-
          When true (default), implementation PRs are opened as drafts and
          un-drafted when the agent finishes. When false, a shopfloor:wip label
          is used instead to suppress premature reviews. Callers that set this
          to false MUST include 'unlabeled' in their pull_request event types.
      # Runner labels per job tier. Pass a plain string ("ubuntu-latest",
      # "self-hosted") or a JSON array ('["self-hosted", "linux", "x64"]').
      runner_router:
        type: string
        default: "ubuntu-latest"
        description: >-
          Runner for lightweight routing jobs (route, review-skip-check,
          review-aggregator, handle-merge).
      runner_agent:
        type: string
        default: "ubuntu-latest"
        description: >-
          Default runner for all Claude agent stages (triage, spec, plan,
          implement). Per-stage overrides (runner_triage, runner_spec,
          runner_plan, runner_impl) take precedence when non-empty.
      runner_triage:
        type: string
        default: ""
        description: >-
          Runner override for the triage stage. Falls back to runner_agent when empty.
      runner_spec:
        type: string
        default: ""
        description: >-
          Runner override for the spec stage. Falls back to runner_agent when empty.
      runner_plan:
        type: string
        default: ""
        description: >-
          Runner override for the plan stage. Falls back to runner_agent when empty.
      runner_impl:
        type: string
        default: ""
        description: >-
          Runner override for the implement stage. Falls back to runner_agent when empty.
      runner_review:
        type: string
        default: "ubuntu-latest"
        description: >-
          Runner for review agent jobs (review-compliance, review-bugs,
          review-security, review-smells).
      setup_enabled:
        type: boolean
        default: false
        description: >-
          When true, Shopfloor invokes ./.github/actions/shopfloor-setup
          on every agent stage between precheck and the agent step. The
          action must exist at exactly that path. When false (default),
          no setup runs and setup_env_json is ignored.
      setup_review_enabled:
        type: boolean
        default: false
        description: >-
          When true AND setup_enabled is true, also runs the setup action
          on the four review stages (review-compliance, review-bugs,
          review-security, review-smells). Off by default since reviews
          are read-only PR commenters that rarely need a built workspace.
    secrets:
      anthropic_api_key: { required: false }
      claude_code_oauth_token: { required: false }
      aws_access_key_id: { required: false }
      aws_secret_access_key: { required: false }
      aws_region: { required: false }
      aws_bearer_token_bedrock: { required: false }
      anthropic_vertex_project_id: { required: false }
      cloud_ml_region: { required: false }
      google_application_credentials: { required: false }
      anthropic_foundry_resource: { required: false }
      shopfloor_github_app_client_id: { required: false }
      shopfloor_github_app_private_key: { required: false }
      # Optional SECOND GitHub App used exclusively by the review matrix to
      # post PR reviews. The primary App is the PR author for every Shopfloor
      # PR, and GitHub forbids REQUEST_CHANGES / APPROVE on your own PR. So a
      # distinct App identity is required to leave actionable reviews. When
      # unset, the entire review pipeline (skip-check, matrix, aggregator) is
      # gated off and impl PRs exit draft and wait for a human reviewer.
      # Minimal perms for this App: contents:read, pull_requests:write,
      # metadata:read.
      shopfloor_github_app_review_client_id: { required: false }
      shopfloor_github_app_review_private_key: { required: false }
      ssh_signing_key: { required: false }
      setup_env_json:
        required: false
        description: >-
          JSON object whose keys/values are exported as env vars in every
          job that runs setup. Use toJSON() in the caller workflow for
          multi-line values (PEM keys, .env blobs). Each value is
          registered for log masking via ::add-mask::. Reserved keys
          (SHOPFLOOR_STAGE, SHOPFLOOR_ISSUE_NUMBER, SHOPFLOOR_BRANCH_NAME,
          SHOPFLOOR_GITHUB_TOKEN) are dropped with a workflow warning.

env:
  SHOPFLOOR_PLUGIN_MARKETPLACES: |-
    https://github.com/anthropics/claude-code.git
    https://github.com/anthropics/claude-plugins-official.git
  # Tools every Shopfloor agent gets on top of its stage-specific allowlist.
  # - Agent, Skill, LSP: subagent dispatch, skill invocation, and LSP-backed code intelligence.
  # - ToolSearch: deferred-tool discovery. Useful for every stage.
  # - Bash(gh api:*): authenticated calls against api.github.com (issue bodies, PR files, etc.).
  # - Bash(curl:*): authenticated downloads for user-uploaded images/files on issue and comment bodies,
  #   which live on redirect hosts (user-attachments, user-images.githubusercontent.com) that are
  #   outside api.github.com and therefore not reachable via `gh api` alone. claude-code-action
  #   exports GITHUB_TOKEN into the subprocess env, so `curl -L -H "Authorization: Bearer $GITHUB_TOKEN"`
  #   works for private repos too.
  SHOPFLOOR_COMMON_TOOLS: "Agent,Skill,LSP,ToolSearch,Bash(gh api:*),Bash(curl:*)"
  # Interactive or irrelevant tools that have no place in an automated Shopfloor run.
  # - AskUserQuestion: no human is attached to the run.
  # - EnterPlanMode / ExitPlanMode: plan mode is a human-in-the-loop construct; Shopfloor has its own plan stage.
  # - EnterWorktree / ExitWorktree: Shopfloor runs on a pre-created branch and forbids worktrees.
  # - TodoWrite / TaskCreate: progress tracking goes through mcp__shopfloor__update_progress, not scratch lists.
  # - WebSearch: agents should use WebFetch with a specific URL; open-ended web search is off-budget.
  SHOPFLOOR_DISALLOWED_TOOLS: "AskUserQuestion,EnterPlanMode,EnterWorktree,ExitPlanMode,ExitWorktree,TodoWrite,TaskCreate,WebSearch"

jobs:
  route:
    runs-on: ${{ startsWith(inputs.runner_router, '[') && fromJSON(inputs.runner_router) || inputs.runner_router }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    # The `secrets` context is unavailable inside step-level `if:` expressions
    # AND inside downstream jobs' job-level `if:` expressions, so we capture
    # secret presence into job-level env vars here (where secrets ARE visible)
    # and re-export them as outputs for other jobs to gate on.
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
      SHOPFLOOR_HAS_REVIEW_APP: ${{ secrets.shopfloor_github_app_review_client_id != '' && secrets.shopfloor_github_app_review_private_key != '' }}
    outputs:
      stage: ${{ steps.router.outputs.stage }}
      issue_number: ${{ steps.router.outputs.issue_number }}
      complexity: ${{ steps.router.outputs.complexity }}
      branch_name: ${{ steps.router.outputs.branch_name }}
      spec_file_path: ${{ steps.router.outputs.spec_file_path }}
      plan_file_path: ${{ steps.router.outputs.plan_file_path }}
      revision_mode: ${{ steps.router.outputs.revision_mode }}
      review_iteration: ${{ steps.router.outputs.review_iteration }}
      impl_pr_number: ${{ steps.router.outputs.impl_pr_number }}
      reason: ${{ steps.router.outputs.reason }}
      has_review_app: ${{ steps.flags.outputs.has_review_app }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # actions/checkout installs an http extraheader using GITHUB_TOKEN
          # that overrides any x-access-token embedded in the remote URL. With
          # read-only caller perms that credential has no write scope, so App-
          # token pushes later in the job would 403. Disable persistence.
          persist-credentials: false
      - id: flags
        # Forward secret-presence flags as outputs so downstream job-level
        # `if:` conditions (which cannot reference `secrets` directly) can
        # gate on the review App being configured.
        run: |
          echo "has_review_app=${SHOPFLOOR_HAS_REVIEW_APP}" >> "$GITHUB_OUTPUT"
      - name: Warn if no GitHub App configured
        if: ${{ env.SHOPFLOOR_HAS_APP != 'true' }}
        run: |
          echo "::warning title=Shopfloor::No GitHub App credentials configured (shopfloor_github_app_client_id / shopfloor_github_app_private_key). Falling back to GITHUB_TOKEN. The pipeline WILL stall at every label flip because GitHub suppresses workflow triggers from GITHUB_TOKEN-caused events. See docs/shopfloor/install.md for the GitHub App setup."
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - id: bootstrap
        uses: niranjan94/shopfloor/router@main
        with:
          helper: bootstrap-labels
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
      - id: router
        uses: niranjan94/shopfloor/router@main
        with:
          helper: route
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          trigger_label: ${{ inputs.trigger_label }}
      # When a human reviewer leaves CHANGES_REQUESTED on an impl PR the router
      # decides stage=implement+revisionMode=true, but no helper has flipped the
      # issue's labels into shopfloor:review-requested-changes (the agent path
      # does this via aggregate-review). Without this step the implement
      # precheck would skip with implement_neither_needs_impl_nor_revision_label_present.
      # Also clears shopfloor:review-stuck so a human review unsticks an issue
      # that the agent loop has given up on.
      - name: Apply review-revision labels for human-requested changes
        if: ${{ github.event_name == 'pull_request_review' && steps.router.outputs.stage == 'implement' && steps.router.outputs.revision_mode == 'true' }}
        uses: niranjan94/shopfloor/router@main
        with:
          helper: apply-review-revision
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ steps.router.outputs.issue_number }}

  triage:
    needs: route
    if: needs.route.outputs.stage == 'triage'
    concurrency:
      group: shopfloor-triage-${{ needs.route.outputs.issue_number }}
      cancel-in-progress: false
    runs-on: ${{ inputs.runner_triage != '' && (startsWith(inputs.runner_triage, '[') && fromJSON(inputs.runner_triage) || inputs.runner_triage) || (startsWith(inputs.runner_agent, '[') && fromJSON(inputs.runner_agent) || inputs.runner_agent) }}
    timeout-minutes: ${{ inputs.triage_timeout_minutes }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Mint a GitHub App installation token up front and reuse it for every
      # non-claude-code-action step in this job: the context builder's gh api
      # call, render-prompt, apply-triage-decision (whose label flip must
      # trigger the next stage's workflow), and report-failure. The App token
      # lives about an hour, which is comfortably longer than the triage
      # agent's wall-clock, so a single mint covers the whole job. Only
      # claude-code-action keeps secrets.GITHUB_TOKEN, because its subprocess
      # may run longer than the App token's lifetime.
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Precheck triage preconditions
        id: precheck
        uses: niranjan94/shopfloor/router@main
        with:
          helper: precheck-stage
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          stage: triage
          issue_number: ${{ needs.route.outputs.issue_number }}
      - name: Log precheck skip
        if: steps.precheck.outputs.skip == 'true'
        run: echo "::notice title=Shopfloor triage skipped::${{ steps.precheck.outputs.reason }}"
      # Claim the triage mutex before the agent runs. precheck-stage has
      # already verified shopfloor:triaging is absent; this step adds it so
      # that any queued second triage run for the same issue skips at its
      # own precheck. Cleared on success by apply-triage-decision, on
      # failure by report-failure (stage=triage).
      - name: Mark triage as running
        if: steps.precheck.outputs.skip != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: advance-state
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: ""
          to_labels: shopfloor:triaging
      - name: Export Shopfloor setup env
        if: inputs.setup_enabled && steps.precheck.outputs.skip != 'true'
        env:
          SETUP_ENV_JSON: ${{ secrets.setup_env_json }}
          SHOPFLOOR_STAGE: triage
          SHOPFLOOR_ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          SHOPFLOOR_BRANCH_NAME: ${{ needs.route.outputs.branch_name }}
          SHOPFLOOR_GITHUB_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          {
            printf 'SHOPFLOOR_STAGE=%s\n' "$SHOPFLOOR_STAGE"
            printf 'SHOPFLOOR_ISSUE_NUMBER=%s\n' "$SHOPFLOOR_ISSUE_NUMBER"
            printf 'SHOPFLOOR_BRANCH_NAME=%s\n' "$SHOPFLOOR_BRANCH_NAME"
            printf 'SHOPFLOOR_GITHUB_TOKEN=%s\n' "$SHOPFLOOR_GITHUB_TOKEN"
          } >> "$GITHUB_ENV"
          if [ -n "$SETUP_ENV_JSON" ]; then
            RESERVED='["SHOPFLOOR_STAGE","SHOPFLOOR_ISSUE_NUMBER","SHOPFLOOR_BRANCH_NAME","SHOPFLOOR_GITHUB_TOKEN"]'
            printf '%s' "$SETUP_ENV_JSON" | jq -r --argjson r "$RESERVED" '
              keys_unsorted as $ks | $r[] | select(. as $k | $ks | index($k))
            ' | while IFS= read -r dropped; do
              [ -n "$dropped" ] && echo "::warning title=Shopfloor setup::Ignoring reserved key '$dropped' in setup_env_json"
            done
            SAFE_JSON=$(printf '%s' "$SETUP_ENV_JSON" | jq -c --argjson r "$RESERVED" 'with_entries(select(.key as $k | $r | index($k) | not))')
            while IFS= read -r v; do
              [ -n "$v" ] && echo "::add-mask::$v"
            done < <(printf '%s' "$SAFE_JSON" | jq -r '.[]')
            DELIM="SHOPFLOOR_ENV_$(openssl rand -hex 8)"
            printf '%s' "$SAFE_JSON" | jq -r --arg d "$DELIM" '
              to_entries[] | "\(.key)<<\($d)\n\(.value)\n\($d)"
            ' >> "$GITHUB_ENV"
          fi
      - name: Run consumer setup
        if: inputs.setup_enabled && steps.precheck.outputs.skip != 'true'
        uses: ./.github/actions/shopfloor-setup
      - name: Build triage context
        if: steps.precheck.outputs.skip != 'true'
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          if ! ISSUE_COMMENTS=$(gh api --paginate "repos/$REPO_OWNER/$REPO_NAME/issues/$ISSUE_NUMBER/comments" --jq '[.[] | "**@\(.user.login)** (\(.created_at)):\n\(.body)"] | join("\n\n---\n\n")' 2>/dev/null); then
            echo "Warning: failed to fetch issue comments for #$ISSUE_NUMBER" >&2
            ISSUE_COMMENTS=""
          fi
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg issue_comments "$ISSUE_COMMENTS" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, issue_comments: $issue_comments, repo_owner: $repo_owner, repo_name: $repo_name}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render triage prompt
        if: steps.precheck.outputs.skip != 'true'
        id: prompt
        uses: niranjan94/shopfloor/router@main
        with:
          helper: render-prompt
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          prompt_file: prompts/triage.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,WebFetch,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        if: steps.precheck.outputs.skip != 'true'
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1.0.88 -- pinned; v1.0.89+ bug: anthropics/claude-code-action#1205
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          # The Shopfloor GitHub App is the actor that triggers downstream
          # stages, so every claude-code-action invocation past triage sees a
          # Bot actor. Allow all bots so the action does not refuse to run.
          allowed_bots: "*"
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          claude_args: |
            --model ${{ inputs.triage_model }}
            --effort ${{ inputs.triage_effort }}
            ${{ inputs.triage_max_turns != '' && format('--max-turns {0}', inputs.triage_max_turns) || '' }}
            ${{ inputs.triage_max_budget_usd != '' && format('--max-budget-usd {0}', inputs.triage_max_budget_usd) || '' }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
            --json-schema '{"type":"object","properties":{"status":{"type":"string","enum":["classified","needs_clarification"]},"complexity":{"type":"string","enum":["quick","medium","large"]},"rationale":{"type":"string"},"clarifying_questions":{"type":"array","items":{"type":"string"}},"supplied_spec":{"type":["object","null"],"properties":{"source":{"type":"string","enum":["body","path"]},"path":{"type":"string"},"content":{"type":"string"}},"required":["source"]},"supplied_plan":{"type":["object","null"],"properties":{"source":{"type":"string","enum":["body","path"]},"path":{"type":"string"},"content":{"type":"string"}},"required":["source"]}},"required":["status","complexity","rationale","clarifying_questions"]}'
      - name: Apply triage decision
        if: success() && steps.precheck.outputs.skip != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: apply-triage-decision
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          base_branch: ${{ github.event.repository.default_branch }}
          decision_json: ${{ steps.agent.outputs.structured_output }}
      - name: Report failure
        if: failure() && steps.precheck.outputs.skip != 'true'
        uses: niranjan94/shopfloor/router@main
        with:
          helper: report-failure
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: triage
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  spec:
    needs: route
    if: needs.route.outputs.stage == 'spec'
    concurrency:
      group: shopfloor-spec-${{ needs.route.outputs.issue_number }}
      cancel-in-progress: false
    runs-on: ${{ inputs.runner_spec != '' && (startsWith(inputs.runner_spec, '[') && fromJSON(inputs.runner_spec) || inputs.runner_spec) || (startsWith(inputs.runner_agent, '[') && fromJSON(inputs.runner_agent) || inputs.runner_agent) }}
    timeout-minutes: ${{ inputs.spec_timeout_minutes }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    steps:
