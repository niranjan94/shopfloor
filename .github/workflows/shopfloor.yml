          jq -n \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "${PR_TITLE:-}" \
            --arg pr_body "${PR_BODY:-}" \
            --arg base_ref "$BASE_REF" \
            --arg changed_files "$CHANGED_FILES_JSON" \
            --arg plan_file_contents "" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg iteration_count "${{ needs.route.outputs.review_iteration }}" \
            --arg previous_review_comments_json "[]" \
            '{repo_owner: $repo_owner, repo_name: $repo_name, pr_number: $pr_number, pr_title: $pr_title, pr_body: $pr_body, base_ref: $base_ref, changed_files: $changed_files, plan_file_contents: $plan_file_contents, issue_body: $issue_body, iteration_count: $iteration_count, previous_review_comments_json: $previous_review_comments_json}' \
