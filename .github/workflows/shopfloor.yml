name: Shopfloor
on:
  workflow_call:
    inputs:
      triage_model: { type: string, default: sonnet }
      spec_model: { type: string, default: opus }
      plan_model: { type: string, default: opus }
      impl_model: { type: string, default: opus }
      triage_max_turns: { type: number, default: 10 }
      spec_max_turns: { type: number, default: 10 }
      plan_max_turns: { type: number, default: 15 }
      impl_max_turns: { type: number, default: 70 }
      triage_timeout_minutes: { type: number, default: 10 }
      spec_timeout_minutes: { type: number, default: 20 }
      plan_timeout_minutes: { type: number, default: 30 }
      impl_timeout_minutes: { type: number, default: 60 }
      branch_prefix: { type: string, default: "shopfloor/" }
      artifacts_dir: { type: string, default: "docs/shopfloor/" }
      impl_bash_allowlist:
        type: string
        default: "pnpm install,pnpm test:*,pnpm lint:*,pnpm build,pnpm exec tsc"
      additional_tools: { type: string, default: "" }
      review_compliance_model: { type: string, default: sonnet }
      review_bugs_model: { type: string, default: opus }
      review_security_model: { type: string, default: opus }
      review_smells_model: { type: string, default: opus }
      review_compliance_max_turns: { type: number, default: 15 }
      review_bugs_max_turns: { type: number, default: 15 }
      review_security_max_turns: { type: number, default: 15 }
      review_smells_max_turns: { type: number, default: 15 }
      review_compliance_enabled: { type: boolean, default: true }
      review_bugs_enabled: { type: boolean, default: true }
      review_security_enabled: { type: boolean, default: true }
      review_smells_enabled: { type: boolean, default: true }
      review_timeout_minutes: { type: number, default: 20 }
      review_confidence_threshold: { type: number, default: 80 }
      max_review_iterations: { type: number, default: 3 }
      use_bedrock: { type: boolean, default: false }
      use_vertex: { type: boolean, default: false }
      use_foundry: { type: boolean, default: false }
      ssh_signing_key_enabled: { type: boolean, default: false }
      keep_artifacts_forever: { type: boolean, default: true }
      # When set, Shopfloor only enters the pipeline for issues that carry this label.
      # Issues already mid-pipeline (any shopfloor:* state label) are grandfathered in,
      # so removing the trigger label later does not strand in-flight work.
      # Leave empty to run on every new issue.
      trigger_label: { type: string, default: "" }
      # Effort per stage. Passed as `--effort` to claude-code-action.
      # High for design-heavy stages (spec, plan); medium for everything else as a sane default.
      triage_effort: { type: string, default: medium }
      spec_effort: { type: string, default: high }
      plan_effort: { type: string, default: high }
      impl_effort: { type: string, default: medium }
      review_compliance_effort: { type: string, default: medium }
      review_bugs_effort: { type: string, default: medium }
      review_security_effort: { type: string, default: medium }
      review_smells_effort: { type: string, default: medium }
      # Whether claude-code-action should post its own "display report" comment on the PR/issue.
      # Shopfloor's helpers handle all user-facing reporting, so this is on by default as a
      # transparency aid but can be flipped globally here. Pass the literal string 'true' or 'false';
      # claude-code-action expects a string, not a workflow boolean.
      display_report: { type: string, default: "true" }
    secrets:
      anthropic_api_key: { required: false }
      claude_code_oauth_token: { required: false }
      aws_access_key_id: { required: false }
      aws_secret_access_key: { required: false }
      aws_region: { required: false }
      aws_bearer_token_bedrock: { required: false }
      anthropic_vertex_project_id: { required: false }
      cloud_ml_region: { required: false }
      google_application_credentials: { required: false }
      anthropic_foundry_resource: { required: false }
      github_app_id: { required: false }
      github_app_private_key: { required: false }
      ssh_signing_key: { required: false }

concurrency:
  group: shopfloor-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

env:
  SHOPFLOOR_PLUGIN_MARKETPLACES: |-
    https://github.com/anthropics/claude-code.git
    https://github.com/anthropics/claude-plugins-official.git
  # Tools every Shopfloor agent gets on top of its stage-specific allowlist.
  # - Agent, Skill, LSP: subagent dispatch, skill invocation, and LSP-backed code intelligence.
  # - ToolSearch: deferred-tool discovery. Useful for every stage.
  # - Bash(gh api:*): authenticated calls against api.github.com (issue bodies, PR files, etc.).
  # - Bash(curl:*): authenticated downloads for user-uploaded images/files on issue and comment bodies,
  #   which live on redirect hosts (user-attachments, user-images.githubusercontent.com) that are
  #   outside api.github.com and therefore not reachable via `gh api` alone. claude-code-action
  #   exports GITHUB_TOKEN into the subprocess env, so `curl -L -H "Authorization: Bearer $GITHUB_TOKEN"`
  #   works for private repos too.
  SHOPFLOOR_COMMON_TOOLS: "Agent,Skill,LSP,ToolSearch,Bash(gh api:*),Bash(curl:*)"
  # Interactive or irrelevant tools that have no place in an automated Shopfloor run.
  # - AskUserQuestion: no human is attached to the run.
  # - EnterPlanMode / ExitPlanMode: plan mode is a human-in-the-loop construct; Shopfloor has its own plan stage.
  # - EnterWorktree / ExitWorktree: Shopfloor runs on a pre-created branch and forbids worktrees.
  # - TodoWrite / TaskCreate: progress tracking goes through mcp__shopfloor__update_progress, not scratch lists.
  # - WebSearch: agents should use WebFetch with a specific URL; open-ended web search is off-budget.
  SHOPFLOOR_DISALLOWED_TOOLS: "AskUserQuestion,EnterPlanMode,EnterWorktree,ExitPlanMode,ExitWorktree,TodoWrite,TaskCreate,WebSearch"

jobs:
  route:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.router.outputs.stage }}
      issue_number: ${{ steps.router.outputs.issue_number }}
      complexity: ${{ steps.router.outputs.complexity }}
      branch_name: ${{ steps.router.outputs.branch_name }}
      spec_file_path: ${{ steps.router.outputs.spec_file_path }}
      plan_file_path: ${{ steps.router.outputs.plan_file_path }}
      revision_mode: ${{ steps.router.outputs.revision_mode }}
      review_iteration: ${{ steps.router.outputs.review_iteration }}
      impl_pr_number: ${{ steps.router.outputs.impl_pr_number }}
      reason: ${{ steps.router.outputs.reason }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: bootstrap
        uses: ./router
        with:
          helper: bootstrap-labels
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - id: router
        uses: ./router
        with:
          helper: route
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_label: ${{ inputs.trigger_label }}

  triage:
    needs: route
    if: needs.route.outputs.stage == 'triage'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.triage_timeout_minutes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build triage context
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg issue_comments "" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            --arg claude_md_contents "$(test -f CLAUDE.md && cat CLAUDE.md || echo '')" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, issue_comments: $issue_comments, repo_owner: $repo_owner, repo_name: $repo_name, claude_md_contents: $claude_md_contents}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render triage prompt
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt_file: prompts/triage.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,WebFetch,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1.0.94
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          claude_args: |
            --model ${{ inputs.triage_model }}
            --effort ${{ inputs.triage_effort }}
            --max-turns ${{ inputs.triage_max_turns }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
      - name: Apply triage decision
        if: success()
        uses: ./router
        with:
          helper: apply-triage-decision
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          decision_json: ${{ steps.agent.outputs.structured_output }}
      - name: Report failure
        if: failure()
        uses: ./router
        with:
          helper: report-failure
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: triage
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  spec:
    needs: route
    if: needs.route.outputs.stage == 'spec'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.spec_timeout_minutes }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Create spec branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ needs.route.outputs.branch_name }}"
      - name: Build spec context
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          BRANCH_NAME: ${{ needs.route.outputs.branch_name }}
          SPEC_FILE_PATH: ${{ needs.route.outputs.spec_file_path }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg issue_comments "" \
            --arg triage_rationale "" \
            --arg branch_name "$BRANCH_NAME" \
            --arg spec_file_path "$SPEC_FILE_PATH" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            --arg previous_spec_contents "" \
            --arg review_comments_json "[]" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, issue_comments: $issue_comments, triage_rationale: $triage_rationale, branch_name: $branch_name, spec_file_path: $spec_file_path, repo_owner: $repo_owner, repo_name: $repo_name, previous_spec_contents: $previous_spec_contents, review_comments_json: $review_comments_json}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render spec prompt
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt_file: prompts/spec.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,Edit,Write,WebFetch,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1.0.94
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          plugins: |-
            superpowers@claude-plugins-official
          claude_args: |
            --model ${{ inputs.spec_model }}
            --effort ${{ inputs.spec_effort }}
            --max-turns ${{ inputs.spec_max_turns }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
      - name: Commit and push spec
        if: success()
        run: |
          git add "${{ needs.route.outputs.spec_file_path }}"
          git commit -m "docs(spec): add ${{ needs.route.outputs.spec_file_path }}"
          git push -u origin "${{ needs.route.outputs.branch_name }}"
      - name: Open spec PR
        if: success()
        id: open_pr
        uses: ./router
        with:
          helper: open-stage-pr
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: spec
          branch_name: ${{ needs.route.outputs.branch_name }}
          base_branch: ${{ github.event.repository.default_branch }}
          pr_title: ${{ fromJSON(steps.agent.outputs.structured_output).pr_title }}
          pr_body: ${{ fromJSON(steps.agent.outputs.structured_output).pr_body }}
      - name: Advance state to spec-in-review
        if: success()
        uses: ./router
        with:
          helper: advance-state
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: shopfloor:needs-spec,shopfloor:triaging
          to_labels: shopfloor:spec-in-review
      - name: Report failure
        if: failure()
        uses: ./router
        with:
          helper: report-failure
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: spec
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  plan:
    needs: route
    if: needs.route.outputs.stage == 'plan'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.plan_timeout_minutes }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Create plan branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ needs.route.outputs.branch_name }}"
      - name: Build plan context
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          BRANCH_NAME: ${{ needs.route.outputs.branch_name }}
          PLAN_FILE_PATH: ${{ needs.route.outputs.plan_file_path }}
          SPEC_FILE_PATH: ${{ needs.route.outputs.spec_file_path }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg branch_name "$BRANCH_NAME" \
            --arg plan_file_path "$PLAN_FILE_PATH" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            --arg spec_file_contents "$(test -f "$SPEC_FILE_PATH" && cat "$SPEC_FILE_PATH" || echo '')" \
            --arg previous_plan_contents "" \
            --arg review_comments_json "[]" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, branch_name: $branch_name, plan_file_path: $plan_file_path, repo_owner: $repo_owner, repo_name: $repo_name, spec_file_contents: $spec_file_contents, previous_plan_contents: $previous_plan_contents, review_comments_json: $review_comments_json}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render plan prompt
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt_file: prompts/plan.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,Edit,Write,Bash(git log:*),Bash(git diff:*),Bash(git show:*),WebFetch,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1.0.94
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          plugins: |-
            superpowers@claude-plugins-official
          claude_args: |
            --model ${{ inputs.plan_model }}
            --effort ${{ inputs.plan_effort }}
            --max-turns ${{ inputs.plan_max_turns }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
      - name: Commit and push plan
        if: success()
        run: |
          git add "${{ needs.route.outputs.plan_file_path }}"
          git commit -m "docs(plan): add ${{ needs.route.outputs.plan_file_path }}"
          git push -u origin "${{ needs.route.outputs.branch_name }}"
      - name: Open plan PR
        if: success()
        id: open_pr
        uses: ./router
        with:
          helper: open-stage-pr
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: plan
          branch_name: ${{ needs.route.outputs.branch_name }}
          base_branch: ${{ github.event.repository.default_branch }}
          pr_title: ${{ fromJSON(steps.agent.outputs.structured_output).pr_title }}
          pr_body: ${{ fromJSON(steps.agent.outputs.structured_output).pr_body }}
      - name: Advance state to plan-in-review
        if: success()
        uses: ./router
        with:
          helper: advance-state
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: shopfloor:needs-plan
          to_labels: shopfloor:plan-in-review
      - name: Report failure
        if: failure()
        uses: ./router
        with:
          helper: report-failure
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: plan
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  implement:
    needs: route
    if: needs.route.outputs.stage == 'implement'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.impl_timeout_minutes }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      statuses: write
    outputs:
      pr_number: ${{ steps.open_pr.outputs.pr_number }}
      comment_id: ${{ steps.progress.outputs.comment_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Create impl branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ needs.route.outputs.branch_name }}"
          git push -u origin "${{ needs.route.outputs.branch_name }}"
      - id: open_pr
        uses: ./router
        with:
          helper: open-stage-pr
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: implement
          branch_name: ${{ needs.route.outputs.branch_name }}
          base_branch: ${{ github.event.repository.default_branch }}
          pr_title: "[WIP] Implementation for #${{ needs.route.outputs.issue_number }}"
          pr_body: "Shopfloor is drafting this PR now. The body will be replaced when work completes."
      - id: progress
        uses: ./router
        with:
          helper: create-progress-comment
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ steps.open_pr.outputs.pr_number }}
      - name: Write Shopfloor MCP config
        run: |
          cat > "$RUNNER_TEMP/shopfloor-mcp.json" <<EOF
          {
            "mcpServers": {
              "shopfloor": {
                "command": "bun",
                "args": ["run", "mcp-servers/shopfloor-mcp/index.ts"],
                "env": {
                  "GITHUB_TOKEN": "${{ secrets.GITHUB_TOKEN }}",
                  "REPO_OWNER": "${{ github.repository_owner }}",
                  "REPO_NAME": "${{ github.event.repository.name }}",
                  "SHOPFLOOR_COMMENT_ID": "${{ steps.progress.outputs.comment_id }}",
                  "GITHUB_API_URL": "${{ github.api_url }}"
                }
              }
            }
          }
          EOF
      - name: Build implement context
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          BRANCH_NAME: ${{ needs.route.outputs.branch_name }}
          SPEC_FILE_PATH: ${{ needs.route.outputs.spec_file_path }}
          PLAN_FILE_PATH: ${{ needs.route.outputs.plan_file_path }}
          PROGRESS_COMMENT_ID: ${{ steps.progress.outputs.comment_id }}
          BASH_ALLOWLIST: ${{ inputs.impl_bash_allowlist }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg spec_file_contents "$(test -f "$SPEC_FILE_PATH" && cat "$SPEC_FILE_PATH" || echo '')" \
            --arg plan_file_contents "$(test -f "$PLAN_FILE_PATH" && cat "$PLAN_FILE_PATH" || echo '')" \
            --arg branch_name "$BRANCH_NAME" \
            --arg progress_comment_id "$PROGRESS_COMMENT_ID" \
            --arg review_comments_json "[]" \
            --arg iteration_count "0" \
            --arg bash_allowlist "$BASH_ALLOWLIST" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, spec_file_contents: $spec_file_contents, plan_file_contents: $plan_file_contents, branch_name: $branch_name, progress_comment_id: $progress_comment_id, review_comments_json: $review_comments_json, iteration_count: $iteration_count, bash_allowlist: $bash_allowlist, repo_owner: $repo_owner, repo_name: $repo_name}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render implement prompt
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt_file: prompts/implement.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,Edit,Write,Bash(${{ inputs.impl_bash_allowlist }}),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git add:*),Bash(git commit:*),Bash(git status:*),Bash(git rev-parse:*),WebFetch,mcp__shopfloor__update_progress,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1.0.94
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          plugins: |-
            superpowers@claude-plugins-official
          claude_args: |
            --model ${{ inputs.impl_model }}
            --effort ${{ inputs.impl_effort }}
            --max-turns ${{ inputs.impl_max_turns }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
            --mcp-config $RUNNER_TEMP/shopfloor-mcp.json
      - name: Push impl commits
        if: success()
        run: git push origin "${{ needs.route.outputs.branch_name }}"
      - name: Finalize progress comment
        if: always()
        uses: ./router
        with:
          helper: finalize-progress-comment
          github_token: ${{ secrets.GITHUB_TOKEN }}
          comment_id: ${{ steps.progress.outputs.comment_id }}
          terminal_state: ${{ job.status == 'success' && 'success' || 'failure' }}
          final_body: ${{ steps.agent.outputs.structured_output && fromJSON(steps.agent.outputs.structured_output).summary_for_issue_comment || 'Implementation ended with errors.' }}
      - name: Apply impl postwork (update PR, flip labels)
        if: success()
        uses: ./router
        with:
          helper: apply-impl-postwork
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          pr_number: ${{ steps.open_pr.outputs.pr_number }}
          pr_title: ${{ fromJSON(steps.agent.outputs.structured_output).pr_title }}
          pr_body: ${{ fromJSON(steps.agent.outputs.structured_output).pr_body }}
      - name: Report failure
        if: failure()
        uses: ./router
        with:
          helper: report-failure
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: implement
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          target_pr_number: ${{ steps.open_pr.outputs.pr_number }}

  review-skip-check:
    needs: route
    if: needs.route.outputs.stage == 'review'
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        uses: ./router
        with:
          helper: check-review-skip
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ needs.route.outputs.impl_pr_number }}

  review-compliance:
    needs: [route, review-skip-check]
    if: needs.route.outputs.stage == 'review' && needs.review-skip-check.outputs.skip == 'false' && inputs.review_compliance_enabled
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.review_timeout_minutes }}
    outputs:
      structured_output: ${{ steps.agent.outputs.structured_output }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: refs/pull/${{ needs.route.outputs.impl_pr_number }}/head
          fetch-depth: 0
      - name: Build review context
        id: ctx
        env:
          PR_NUMBER: ${{ needs.route.outputs.impl_pr_number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          DIFF=$(git diff "origin/${BASE_REF}...HEAD" | head -c 200000 || echo "")
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" | tr '\n' ',' | sed 's/,$//')
          jq -n \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "${PR_TITLE:-}" \
            --arg pr_body "${PR_BODY:-}" \
            --arg diff "$DIFF" \
            --arg changed_files "$CHANGED" \
            --arg spec_file_contents "" \
            --arg plan_file_contents "" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg iteration_count "${{ needs.route.outputs.review_iteration }}" \
            --arg previous_review_comments_json "[]" \
            '{repo_owner: $repo_owner, repo_name: $repo_name, pr_number: $pr_number, pr_title: $pr_title, pr_body: $pr_body, diff: $diff, changed_files: $changed_files, spec_file_contents: $spec_file_contents, plan_file_contents: $plan_file_contents, issue_body: $issue_body, iteration_count: $iteration_count, previous_review_comments_json: $previous_review_comments_json}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render compliance prompt
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt_file: prompts/review-compliance.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git show:*),WebFetch,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1.0.94
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          claude_args: |
            --model ${{ inputs.review_compliance_model }}
            --effort ${{ inputs.review_compliance_effort }}
            --max-turns ${{ inputs.review_compliance_max_turns }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"

