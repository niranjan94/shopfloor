name: Shopfloor
on:
  workflow_call:
    inputs:
      triage_model: { type: string, default: sonnet }
      spec_model: { type: string, default: opus }
      plan_model: { type: string, default: opus }
      impl_model: { type: string, default: opus }
      triage_max_turns: { type: number, default: 10 }
      spec_max_turns: { type: number, default: 10 }
      plan_max_turns: { type: number, default: 15 }
      triage_timeout_minutes: { type: number, default: 10 }
      spec_timeout_minutes: { type: number, default: 20 }
      plan_timeout_minutes: { type: number, default: 30 }
      impl_timeout_minutes: { type: number, default: 60 }
      branch_prefix: { type: string, default: "shopfloor/" }
      artifacts_dir: { type: string, default: "docs/shopfloor/" }
      impl_bash_allowlist:
        type: string
        default: "pnpm install,pnpm test:*,pnpm lint:*,pnpm build,pnpm exec tsc"
      additional_tools: { type: string, default: "" }
      review_compliance_model: { type: string, default: sonnet }
      review_bugs_model: { type: string, default: opus }
      review_security_model: { type: string, default: opus }
      review_smells_model: { type: string, default: opus }
      review_compliance_max_turns: { type: number, default: 15 }
      review_bugs_max_turns: { type: number, default: 15 }
      review_security_max_turns: { type: number, default: 15 }
      review_smells_max_turns: { type: number, default: 15 }
      review_compliance_enabled: { type: boolean, default: true }
      review_bugs_enabled: { type: boolean, default: true }
      review_security_enabled: { type: boolean, default: true }
      review_smells_enabled: { type: boolean, default: true }
      review_timeout_minutes: { type: number, default: 20 }
      review_confidence_threshold: { type: number, default: 80 }
      max_review_iterations: { type: number, default: 3 }
      use_bedrock: { type: boolean, default: false }
      use_vertex: { type: boolean, default: false }
      use_foundry: { type: boolean, default: false }
      ssh_signing_key_enabled: { type: boolean, default: false }
      keep_artifacts_forever: { type: boolean, default: true }
      # When set, Shopfloor only enters the pipeline for issues that carry this label.
      # Issues already mid-pipeline (any shopfloor:* state label) are grandfathered in,
      # so removing the trigger label later does not strand in-flight work.
      # Leave empty to run on every new issue.
      trigger_label: { type: string, default: "" }
      # Effort per stage. Passed as `--effort` to claude-code-action.
      # High for design-heavy stages (spec, plan); medium for everything else as a sane default.
      triage_effort: { type: string, default: medium }
      spec_effort: { type: string, default: high }
      plan_effort: { type: string, default: high }
      impl_effort: { type: string, default: medium }
      review_compliance_effort: { type: string, default: medium }
      review_bugs_effort: { type: string, default: medium }
      review_security_effort: { type: string, default: medium }
      review_smells_effort: { type: string, default: medium }
      # Whether claude-code-action should post its own "display report" comment on the PR/issue.
      # Shopfloor's helpers handle all user-facing reporting, so this is on by default as a
      # transparency aid but can be flipped globally here. Pass the literal string 'true' or 'false';
      # claude-code-action expects a string, not a workflow boolean.
      display_report: { type: string, default: "true" }
    secrets:
      anthropic_api_key: { required: false }
      claude_code_oauth_token: { required: false }
      aws_access_key_id: { required: false }
      aws_secret_access_key: { required: false }
      aws_region: { required: false }
      aws_bearer_token_bedrock: { required: false }
      anthropic_vertex_project_id: { required: false }
      cloud_ml_region: { required: false }
      google_application_credentials: { required: false }
      anthropic_foundry_resource: { required: false }
      shopfloor_github_app_client_id: { required: false }
      shopfloor_github_app_private_key: { required: false }
      # Optional SECOND GitHub App used exclusively by the review matrix to
      # post PR reviews. The primary App is the PR author for every Shopfloor
      # PR, and GitHub forbids REQUEST_CHANGES / APPROVE on your own PR. So a
      # distinct App identity is required to leave actionable reviews. When
      # unset, the entire review pipeline (skip-check, matrix, aggregator) is
      # gated off and impl PRs exit draft and wait for a human reviewer.
      # Minimal perms for this App: contents:read, pull_requests:write,
      # metadata:read.
      shopfloor_github_app_review_client_id: { required: false }
      shopfloor_github_app_review_private_key: { required: false }
      ssh_signing_key: { required: false }

env:
  SHOPFLOOR_PLUGIN_MARKETPLACES: |-
    https://github.com/anthropics/claude-code.git
    https://github.com/anthropics/claude-plugins-official.git
  # Tools every Shopfloor agent gets on top of its stage-specific allowlist.
  # - Agent, Skill, LSP: subagent dispatch, skill invocation, and LSP-backed code intelligence.
  # - ToolSearch: deferred-tool discovery. Useful for every stage.
  # - Bash(gh api:*): authenticated calls against api.github.com (issue bodies, PR files, etc.).
  # - Bash(curl:*): authenticated downloads for user-uploaded images/files on issue and comment bodies,
  #   which live on redirect hosts (user-attachments, user-images.githubusercontent.com) that are
  #   outside api.github.com and therefore not reachable via `gh api` alone. claude-code-action
  #   exports GITHUB_TOKEN into the subprocess env, so `curl -L -H "Authorization: Bearer $GITHUB_TOKEN"`
  #   works for private repos too.
  SHOPFLOOR_COMMON_TOOLS: "Agent,Skill,LSP,ToolSearch,Bash(gh api:*),Bash(curl:*)"
  # Interactive or irrelevant tools that have no place in an automated Shopfloor run.
  # - AskUserQuestion: no human is attached to the run.
  # - EnterPlanMode / ExitPlanMode: plan mode is a human-in-the-loop construct; Shopfloor has its own plan stage.
  # - EnterWorktree / ExitWorktree: Shopfloor runs on a pre-created branch and forbids worktrees.
  # - TodoWrite / TaskCreate: progress tracking goes through mcp__shopfloor__update_progress, not scratch lists.
  # - WebSearch: agents should use WebFetch with a specific URL; open-ended web search is off-budget.
  SHOPFLOOR_DISALLOWED_TOOLS: "AskUserQuestion,EnterPlanMode,EnterWorktree,ExitPlanMode,ExitWorktree,TodoWrite,TaskCreate,WebSearch"

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    # The `secrets` context is unavailable inside step-level `if:` expressions
    # AND inside downstream jobs' job-level `if:` expressions, so we capture
    # secret presence into job-level env vars here (where secrets ARE visible)
    # and re-export them as outputs for other jobs to gate on.
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
      SHOPFLOOR_HAS_REVIEW_APP: ${{ secrets.shopfloor_github_app_review_client_id != '' && secrets.shopfloor_github_app_review_private_key != '' }}
    outputs:
      stage: ${{ steps.router.outputs.stage }}
      issue_number: ${{ steps.router.outputs.issue_number }}
      complexity: ${{ steps.router.outputs.complexity }}
      branch_name: ${{ steps.router.outputs.branch_name }}
      spec_file_path: ${{ steps.router.outputs.spec_file_path }}
      plan_file_path: ${{ steps.router.outputs.plan_file_path }}
      revision_mode: ${{ steps.router.outputs.revision_mode }}
      review_iteration: ${{ steps.router.outputs.review_iteration }}
      impl_pr_number: ${{ steps.router.outputs.impl_pr_number }}
      reason: ${{ steps.router.outputs.reason }}
      has_review_app: ${{ steps.flags.outputs.has_review_app }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # actions/checkout installs an http extraheader using GITHUB_TOKEN
          # that overrides any x-access-token embedded in the remote URL. With
          # read-only caller perms that credential has no write scope, so App-
          # token pushes later in the job would 403. Disable persistence.
          persist-credentials: false
      - id: flags
        # Forward secret-presence flags as outputs so downstream job-level
        # `if:` conditions (which cannot reference `secrets` directly) can
        # gate on the review App being configured.
        run: |
          echo "has_review_app=${SHOPFLOOR_HAS_REVIEW_APP}" >> "$GITHUB_OUTPUT"
      - name: Warn if no GitHub App configured
        if: ${{ env.SHOPFLOOR_HAS_APP != 'true' }}
        run: |
          echo "::warning title=Shopfloor::No GitHub App credentials configured (shopfloor_github_app_client_id / shopfloor_github_app_private_key). Falling back to GITHUB_TOKEN. The pipeline WILL stall at every label flip because GitHub suppresses workflow triggers from GITHUB_TOKEN-caused events. See docs/shopfloor/install.md for the GitHub App setup."
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - id: bootstrap
        uses: ./router
        with:
          helper: bootstrap-labels
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
      - id: router
        uses: ./router
        with:
          helper: route
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          trigger_label: ${{ inputs.trigger_label }}

  triage:
    needs: route
    if: needs.route.outputs.stage == 'triage'
    concurrency:
      group: shopfloor-triage-${{ needs.route.outputs.issue_number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.triage_timeout_minutes }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Mint a GitHub App installation token up front and reuse it for every
      # non-claude-code-action step in this job: the context builder's gh api
      # call, render-prompt, apply-triage-decision (whose label flip must
      # trigger the next stage's workflow), and report-failure. The App token
      # lives about an hour, which is comfortably longer than the triage
      # agent's wall-clock, so a single mint covers the whole job. Only
      # claude-code-action keeps secrets.GITHUB_TOKEN, because its subprocess
      # may run longer than the App token's lifetime.
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Precheck triage preconditions
        id: precheck
        uses: ./router
        with:
          helper: precheck-stage
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          stage: triage
          issue_number: ${{ needs.route.outputs.issue_number }}
      - name: Log precheck skip
        if: steps.precheck.outputs.skip == 'true'
        run: echo "::notice title=Shopfloor triage skipped::${{ steps.precheck.outputs.reason }}"
      # Claim the triage mutex before the agent runs. precheck-stage has
      # already verified shopfloor:triaging is absent; this step adds it so
      # that any queued second triage run for the same issue skips at its
      # own precheck. Cleared on success by apply-triage-decision, on
      # failure by report-failure (stage=triage).
      - name: Mark triage as running
        if: steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: advance-state
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: ""
          to_labels: shopfloor:triaging
      - name: Build triage context
        if: steps.precheck.outputs.skip != 'true'
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          if ! ISSUE_COMMENTS=$(gh api --paginate "repos/$REPO_OWNER/$REPO_NAME/issues/$ISSUE_NUMBER/comments" --jq '[.[] | "**@\(.user.login)** (\(.created_at)):\n\(.body)"] | join("\n\n---\n\n")' 2>/dev/null); then
            echo "Warning: failed to fetch issue comments for #$ISSUE_NUMBER" >&2
            ISSUE_COMMENTS=""
          fi
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg issue_comments "$ISSUE_COMMENTS" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, issue_comments: $issue_comments, repo_owner: $repo_owner, repo_name: $repo_name}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render triage prompt
        if: steps.precheck.outputs.skip != 'true'
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          prompt_file: prompts/triage.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,WebFetch,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        if: steps.precheck.outputs.skip != 'true'
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1.0.88 -- pinned; v1.0.89+ bug: anthropics/claude-code-action#1205
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          # The Shopfloor GitHub App is the actor that triggers downstream
          # stages, so every claude-code-action invocation past triage sees a
          # Bot actor. Allow all bots so the action does not refuse to run.
          allowed_bots: "*"
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          claude_args: |
            --model ${{ inputs.triage_model }}
            --effort ${{ inputs.triage_effort }}
            --max-turns ${{ inputs.triage_max_turns }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
            --json-schema '{"type":"object","properties":{"status":{"type":"string","enum":["classified","needs_clarification"]},"complexity":{"type":"string","enum":["quick","medium","large"]},"rationale":{"type":"string"},"clarifying_questions":{"type":"array","items":{"type":"string"}}},"required":["status","complexity","rationale","clarifying_questions"]}'
      - name: Apply triage decision
        if: success() && steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: apply-triage-decision
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          decision_json: ${{ steps.agent.outputs.structured_output }}
      - name: Report failure
        if: failure() && steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: report-failure
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: triage
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  spec:
    needs: route
    if: needs.route.outputs.stage == 'spec'
    concurrency:
      group: shopfloor-spec-${{ needs.route.outputs.issue_number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.spec_timeout_minutes }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Single mint up front covers everything in this job: git push, context
      # builder, render-prompt, open-stage-pr, advance-state, report-failure.
      # Only claude-code-action stays on secrets.GITHUB_TOKEN.
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Reconfigure git remote with App token
        if: ${{ steps.app_token.outputs.token != '' }}
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"
      - name: Precheck spec preconditions
        id: precheck
        uses: ./router
        with:
          helper: precheck-stage
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          stage: spec
          issue_number: ${{ needs.route.outputs.issue_number }}
      - name: Log precheck skip
        if: steps.precheck.outputs.skip == 'true'
        run: echo "::notice title=Shopfloor spec skipped::${{ steps.precheck.outputs.reason }}"
      - name: Mark spec as running
        if: steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: advance-state
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: ""
          to_labels: shopfloor:spec-running
      - name: Create spec branch
        if: steps.precheck.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ needs.route.outputs.branch_name }}"
      - name: Build spec context
        if: steps.precheck.outputs.skip != 'true'
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          BRANCH_NAME: ${{ needs.route.outputs.branch_name }}
          SPEC_FILE_PATH: ${{ needs.route.outputs.spec_file_path }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          if ! ISSUE_COMMENTS=$(gh api --paginate "repos/$REPO_OWNER/$REPO_NAME/issues/$ISSUE_NUMBER/comments" --jq '[.[] | "**@\(.user.login)** (\(.created_at)):\n\(.body)"] | join("\n\n---\n\n")' 2>/dev/null); then
            echo "Warning: failed to fetch issue comments for #$ISSUE_NUMBER" >&2
            ISSUE_COMMENTS=""
          fi
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg issue_comments "$ISSUE_COMMENTS" \
            --arg triage_rationale "" \
            --arg branch_name "$BRANCH_NAME" \
            --arg spec_file_path "$SPEC_FILE_PATH" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            --arg previous_spec_contents "" \
            --arg review_comments_json "[]" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, issue_comments: $issue_comments, triage_rationale: $triage_rationale, branch_name: $branch_name, spec_file_path: $spec_file_path, repo_owner: $repo_owner, repo_name: $repo_name, previous_spec_contents: $previous_spec_contents, review_comments_json: $review_comments_json}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render spec prompt
        if: steps.precheck.outputs.skip != 'true'
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          prompt_file: prompts/spec.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,Edit,Write,WebFetch,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        if: steps.precheck.outputs.skip != 'true'
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1.0.88 -- pinned; v1.0.89+ bug: anthropics/claude-code-action#1205
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          # The Shopfloor GitHub App is the actor that triggers downstream
          # stages, so every claude-code-action invocation past triage sees a
          # Bot actor. Allow all bots so the action does not refuse to run.
          allowed_bots: "*"
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          plugins: |-
            superpowers@claude-plugins-official
          claude_args: |
            --model ${{ inputs.spec_model }}
            --effort ${{ inputs.spec_effort }}
            --max-turns ${{ inputs.spec_max_turns }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
            --json-schema '{"type":"object","properties":{"file_path":{"type":"string"},"pr_title":{"type":"string"},"pr_body":{"type":"string"},"summary_for_issue_comment":{"type":"string"}},"required":["file_path","pr_title","pr_body","summary_for_issue_comment"]}'
      - name: Commit and push spec
        if: success() && steps.precheck.outputs.skip != 'true'
        run: |
          git add "${{ needs.route.outputs.spec_file_path }}"
          git commit -m "docs(spec): add ${{ needs.route.outputs.spec_file_path }}"
          # Force-push to overwrite any stale branch from a previous failed run.
          git push -u origin "${{ needs.route.outputs.branch_name }}" --force
      - name: Open spec PR
        if: success() && steps.precheck.outputs.skip != 'true'
        id: open_pr
        uses: ./router
        with:
          helper: open-stage-pr
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: spec
          branch_name: ${{ needs.route.outputs.branch_name }}
          base_branch: ${{ github.event.repository.default_branch }}
          pr_title: ${{ fromJSON(steps.agent.outputs.structured_output).pr_title }}
          pr_body: ${{ fromJSON(steps.agent.outputs.structured_output).pr_body }}
      - name: Advance state to spec-in-review
        if: success() && steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: advance-state
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: shopfloor:needs-spec,shopfloor:triaging,shopfloor:spec-running
          to_labels: shopfloor:spec-in-review
      - name: Report failure
        if: failure() && steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: report-failure
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: spec
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  plan:
    needs: route
    if: needs.route.outputs.stage == 'plan'
    concurrency:
      group: shopfloor-plan-${{ needs.route.outputs.issue_number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.plan_timeout_minutes }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Single mint up front covers everything in this job: git push, context
      # builder, render-prompt, open-stage-pr, advance-state, report-failure.
      # Only claude-code-action stays on secrets.GITHUB_TOKEN.
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Reconfigure git remote with App token
        if: ${{ steps.app_token.outputs.token != '' }}
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"
      - name: Precheck plan preconditions
        id: precheck
        uses: ./router
        with:
          helper: precheck-stage
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          stage: plan
          issue_number: ${{ needs.route.outputs.issue_number }}
      - name: Log precheck skip
        if: steps.precheck.outputs.skip == 'true'
        run: echo "::notice title=Shopfloor plan skipped::${{ steps.precheck.outputs.reason }}"
      - name: Mark plan as running
        if: steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: advance-state
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: ""
          to_labels: shopfloor:plan-running
      - name: Create plan branch
        if: steps.precheck.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ needs.route.outputs.branch_name }}"
      - name: Build plan context
        if: steps.precheck.outputs.skip != 'true'
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          BRANCH_NAME: ${{ needs.route.outputs.branch_name }}
          PLAN_FILE_PATH: ${{ needs.route.outputs.plan_file_path }}
          SPEC_FILE_PATH: ${{ needs.route.outputs.spec_file_path }}
          COMPLEXITY: ${{ needs.route.outputs.complexity }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          if ! ISSUE_COMMENTS=$(gh api --paginate "repos/$REPO_OWNER/$REPO_NAME/issues/$ISSUE_NUMBER/comments" --jq '[.[] | "**@\(.user.login)** (\(.created_at)):\n\(.body)"] | join("\n\n---\n\n")' 2>/dev/null); then
            echo "Warning: failed to fetch issue comments for #$ISSUE_NUMBER" >&2
            ISSUE_COMMENTS=""
          fi
          # Compose the spec_source slot that plan.md renders verbatim. Large
          # flow: wrap the real spec file in <spec_file_contents>. Medium flow:
          # emit a concrete "no spec for this issue" statement so the agent
          # derives the design directly from the issue body and comments.
          if [ -f "$SPEC_FILE_PATH" ]; then
            SPEC_SOURCE=$(printf '<spec_file_contents>\n%s\n</spec_file_contents>' "$(cat "$SPEC_FILE_PATH")")
          else
            SPEC_SOURCE=$'<spec_source>\nThere is no spec for this issue. This is the medium-complexity flow, which skips the spec stage by design. Derive the design directly from the <issue_body> and <issue_comments> above, then write the plan as usual.\n</spec_source>'
          fi
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg issue_comments "$ISSUE_COMMENTS" \
            --arg branch_name "$BRANCH_NAME" \
            --arg plan_file_path "$PLAN_FILE_PATH" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            --arg spec_source "$SPEC_SOURCE" \
            --arg previous_plan_contents "" \
            --arg review_comments_json "[]" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, issue_comments: $issue_comments, branch_name: $branch_name, plan_file_path: $plan_file_path, repo_owner: $repo_owner, repo_name: $repo_name, spec_source: $spec_source, previous_plan_contents: $previous_plan_contents, review_comments_json: $review_comments_json}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render plan prompt
        if: steps.precheck.outputs.skip != 'true'
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          prompt_file: prompts/plan.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,Edit,Write,Bash(git log:*),Bash(git diff:*),Bash(git show:*),WebFetch,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        if: steps.precheck.outputs.skip != 'true'
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1.0.88 -- pinned; v1.0.89+ bug: anthropics/claude-code-action#1205
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          # The Shopfloor GitHub App is the actor that triggers downstream
          # stages, so every claude-code-action invocation past triage sees a
          # Bot actor. Allow all bots so the action does not refuse to run.
          allowed_bots: "*"
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          plugins: |-
            superpowers@claude-plugins-official
          claude_args: |
            --model ${{ inputs.plan_model }}
            --effort ${{ inputs.plan_effort }}
            --max-turns ${{ inputs.plan_max_turns }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
            --json-schema '{"type":"object","properties":{"file_path":{"type":"string"},"pr_title":{"type":"string"},"pr_body":{"type":"string"},"summary_for_issue_comment":{"type":"string"}},"required":["file_path","pr_title","pr_body","summary_for_issue_comment"]}'
      - name: Commit and push plan
        if: success() && steps.precheck.outputs.skip != 'true'
        run: |
          git add "${{ needs.route.outputs.plan_file_path }}"
          git commit -m "docs(plan): add ${{ needs.route.outputs.plan_file_path }}"
          # Force-push to overwrite any stale branch from a previous failed run.
          git push -u origin "${{ needs.route.outputs.branch_name }}" --force
      - name: Open plan PR
        if: success() && steps.precheck.outputs.skip != 'true'
        id: open_pr
        uses: ./router
        with:
          helper: open-stage-pr
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: plan
          branch_name: ${{ needs.route.outputs.branch_name }}
          base_branch: ${{ github.event.repository.default_branch }}
          pr_title: ${{ fromJSON(steps.agent.outputs.structured_output).pr_title }}
          pr_body: ${{ fromJSON(steps.agent.outputs.structured_output).pr_body }}
      - name: Advance state to plan-in-review
        if: success() && steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: advance-state
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: shopfloor:needs-plan,shopfloor:plan-running
          to_labels: shopfloor:plan-in-review
      - name: Report failure
        if: failure() && steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: report-failure
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: plan
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  implement:
    needs: route
    if: needs.route.outputs.stage == 'implement'
    concurrency:
      group: shopfloor-implement-${{ needs.route.outputs.issue_number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.impl_timeout_minutes }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    outputs:
      pr_number: ${{ steps.open_pr.outputs.pr_number }}
      comment_id: ${{ steps.progress.outputs.comment_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # The impl job mints App tokens in two phases. The PRE token covers
      # everything before the agent runs: the initial branch push, the draft
      # PR, the progress comment, the context builder's gh api call, and
      # render-prompt. The PUSH token (minted later, after the agent) covers
      # the post-agent push, the ready_for_review un-draft, the progress
      # finalize, and the postwork label flip. Two mints are needed because
      # the impl agent can run up to 60 minutes, longer than the 1-hour App
      # installation token lifetime, so the post-agent token is freshly
      # minted right when it is needed. Only claude-code-action itself stays
      # on secrets.GITHUB_TOKEN because its subprocess may run past both.
      - name: Mint pre-agent GitHub App token
        id: app_token_pre
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Reconfigure git remote with pre-agent App token
        if: ${{ steps.app_token_pre.outputs.token != '' }}
        env:
          APP_TOKEN: ${{ steps.app_token_pre.outputs.token }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"
      - name: Precheck implement preconditions
        id: precheck
        uses: ./router
        with:
          helper: precheck-stage
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          stage: implement
          issue_number: ${{ needs.route.outputs.issue_number }}
      - name: Log precheck skip
        if: steps.precheck.outputs.skip == 'true'
        run: echo "::notice title=Shopfloor implement skipped::${{ steps.precheck.outputs.reason }}"
      - name: Mark implement as running
        if: steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: advance-state
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          from_labels: ""
          to_labels: shopfloor:implementing
      - name: Create impl branch
        if: steps.precheck.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ needs.route.outputs.branch_name }}"
          # An empty commit is required so the draft PR opened below has at least
          # one commit difference from the base branch (GitHub rejects zero-commit
          # PRs with "No commits between main and <branch>"). The agent's real
          # commits will stack on top and this placeholder can be squashed away
          # at merge time.
          git commit --allow-empty -m "chore(shopfloor): init impl branch for #${{ needs.route.outputs.issue_number }}"
          # Force-push to overwrite any stale branch left by a previous failed
          # run. Shopfloor owns impl branches outright and retries (which only
          # happen when a human clears the shopfloor:failed:* label) explicitly
          # opt into discarding whatever was there before.
          git push -u origin "${{ needs.route.outputs.branch_name }}" --force
      - id: open_pr
        if: steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: open-stage-pr
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: implement
          branch_name: ${{ needs.route.outputs.branch_name }}
          base_branch: ${{ github.event.repository.default_branch }}
          # Placeholder title using the raw issue title. apply-impl-postwork
          # rewrites both title and body with the agent's Conventional Commits
          # structured output once the agent finishes. Draft status signals WIP.
          pr_title: "wip: ${{ github.event.issue.title }} (#${{ needs.route.outputs.issue_number }})"
          pr_body: |
            Shopfloor is implementing issue #${{ needs.route.outputs.issue_number }} now. The title and body will be rewritten with the agent's final summary when work completes. Follow live progress in the Shopfloor comment below.

            Tracking: #${{ needs.route.outputs.issue_number }}
          draft: "true"
      - id: progress
        if: steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: create-progress-comment
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          pr_number: ${{ steps.open_pr.outputs.pr_number }}
      - name: Write Shopfloor MCP config
        if: steps.precheck.outputs.skip != 'true'
        id: mcp_config
        env:
          MCP_CONFIG_PATH: ${{ runner.temp }}/shopfloor-mcp.json
        run: |
          cat > "$MCP_CONFIG_PATH" <<EOF
          {
            "mcpServers": {
              "shopfloor": {
                "command": "bun",
                "args": ["run", "mcp-servers/shopfloor-mcp/index.ts"],
                "env": {
                  "SHOPFLOOR_GITHUB_APP_CLIENT_ID": "${{ secrets.shopfloor_github_app_client_id }}",
                  "SHOPFLOOR_GITHUB_APP_PRIVATE_KEY": ${{ toJSON(secrets.shopfloor_github_app_private_key) }},
                  "GITHUB_TOKEN": "${{ secrets.GITHUB_TOKEN }}",
                  "REPO_OWNER": "${{ github.repository_owner }}",
                  "REPO_NAME": "${{ github.event.repository.name }}",
                  "SHOPFLOOR_COMMENT_ID": "${{ steps.progress.outputs.comment_id }}",
                  "GITHUB_API_URL": "${{ github.api_url }}"
                }
              }
            }
          }
          EOF
          # claude-code-action does not shell-expand values in claude_args, so
          # we must pass an already-resolved absolute path via ${{ runner.temp }}
          # instead of $RUNNER_TEMP. Fail loudly now if the file is missing so
          # we don't silently feed Claude an unreadable --mcp-config path.
          if [ ! -s "$MCP_CONFIG_PATH" ]; then
            echo "::error title=Shopfloor::MCP config not written at $MCP_CONFIG_PATH" >&2
            exit 1
          fi
          echo "path=$MCP_CONFIG_PATH" >> "$GITHUB_OUTPUT"
      - name: Build implement context
        if: steps.precheck.outputs.skip != 'true'
        id: ctx
        env:
          ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          BRANCH_NAME: ${{ needs.route.outputs.branch_name }}
          SPEC_FILE_PATH: ${{ needs.route.outputs.spec_file_path }}
          PLAN_FILE_PATH: ${{ needs.route.outputs.plan_file_path }}
          COMPLEXITY: ${{ needs.route.outputs.complexity }}
          PROGRESS_COMMENT_ID: ${{ steps.progress.outputs.comment_id }}
          BASH_ALLOWLIST: ${{ inputs.impl_bash_allowlist }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          if ! ISSUE_COMMENTS=$(gh api --paginate "repos/$REPO_OWNER/$REPO_NAME/issues/$ISSUE_NUMBER/comments" --jq '[.[] | "**@\(.user.login)** (\(.created_at)):\n\(.body)"] | join("\n\n---\n\n")' 2>/dev/null); then
            echo "Warning: failed to fetch issue comments for #$ISSUE_NUMBER" >&2
            ISSUE_COMMENTS=""
          fi
          # Compose the spec_source slot that implement.md renders verbatim.
          # Large flow: wrap the real spec file in <spec_file_contents>. Medium
          # flow: emit a concrete "no spec in this flow" statement so the agent
          # treats the plan as the sole source of truth. Quick flow never
          # references spec_source because implement-quick.md has no such slot,
          # so the value we set here is harmless for quick.
          if [ -f "$SPEC_FILE_PATH" ]; then
            SPEC_SOURCE=$(printf '<spec_file_contents>\n%s\n</spec_file_contents>' "$(cat "$SPEC_FILE_PATH")")
          else
            SPEC_SOURCE=$'<spec_source>\nThere is no spec for this issue. This is the medium-complexity flow, which skips the spec stage by design. The <plan_file_contents> below is your sole source of truth for the design.\n</spec_source>'
          fi
          jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg issue_comments "$ISSUE_COMMENTS" \
            --arg spec_source "$SPEC_SOURCE" \
            --arg plan_file_contents "$(test -f "$PLAN_FILE_PATH" && cat "$PLAN_FILE_PATH" || echo '')" \
            --arg branch_name "$BRANCH_NAME" \
            --arg progress_comment_id "$PROGRESS_COMMENT_ID" \
            --arg review_comments_json "[]" \
            --arg iteration_count "0" \
            --arg bash_allowlist "$BASH_ALLOWLIST" \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            '{issue_number: $issue_number, issue_title: $issue_title, issue_body: $issue_body, issue_comments: $issue_comments, spec_source: $spec_source, plan_file_contents: $plan_file_contents, branch_name: $branch_name, progress_comment_id: $progress_comment_id, review_comments_json: $review_comments_json, iteration_count: $iteration_count, bash_allowlist: $bash_allowlist, repo_owner: $repo_owner, repo_name: $repo_name}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      # Quick issues have no plan to follow and should not invoke
      # superpowers:subagent-driven-development. They get a dedicated
      # one-shot prompt and skip the superpowers plugin load entirely.
      # Medium and large both invoke the plan-driven implement prompt,
      # which in turn invokes subagent-driven-development.
      - name: Choose implement prompt and plugins
        if: steps.precheck.outputs.skip != 'true'
        id: impl_choice
        env:
          COMPLEXITY: ${{ needs.route.outputs.complexity }}
        run: |
          # Empty plugins value for quick is captured via a step output here
          # rather than an inline template ternary, because GitHub Actions
          # expression short-circuiting treats the empty string as falsy, so
          # the naive ternary would silently fall through to the non-empty
          # branch and the plugin would load anyway.
          if [ "$COMPLEXITY" = "quick" ]; then
            echo "prompt_file=prompts/implement-quick.md" >> "$GITHUB_OUTPUT"
            echo "plugins=" >> "$GITHUB_OUTPUT"
          else
            echo "prompt_file=prompts/implement.md" >> "$GITHUB_OUTPUT"
            echo "plugins=superpowers@claude-plugins-official" >> "$GITHUB_OUTPUT"
          fi
      - name: Render implement prompt
        if: steps.precheck.outputs.skip != 'true'
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          prompt_file: ${{ steps.impl_choice.outputs.prompt_file }}
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,Edit,Write,Bash(${{ inputs.impl_bash_allowlist }}),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git add:*),Bash(git commit:*),Bash(git status:*),Bash(git rev-parse:*),WebFetch,mcp__shopfloor__update_progress,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        if: steps.precheck.outputs.skip != 'true'
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1.0.88 -- pinned; v1.0.89+ bug: anthropics/claude-code-action#1205
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          # The Shopfloor GitHub App is the actor that triggers downstream
          # stages, so every claude-code-action invocation past triage sees a
          # Bot actor. Allow all bots so the action does not refuse to run.
          allowed_bots: "*"
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          plugins: ${{ steps.impl_choice.outputs.plugins }}
          claude_args: |
            --model ${{ inputs.impl_model }}
            --effort ${{ inputs.impl_effort }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
            --mcp-config ${{ steps.mcp_config.outputs.path }}
            --json-schema '{"type":"object","properties":{"pr_title":{"type":"string"},"pr_body":{"type":"string"},"summary_for_issue_comment":{"type":"string"},"changed_files":{"type":"array","items":{"type":"string"}}},"required":["pr_title","pr_body","summary_for_issue_comment","changed_files"]}'
      # Mint a FRESH GitHub App token here (not at job start). The impl agent can
      # run for up to impl_timeout_minutes (default 60), which exceeds the 1-hour
      # lifetime of an installation token. Minting after the agent guarantees the
      # push below has a full hour of token validity, and the push event (which
      # becomes pull_request.synchronize) triggers the review matrix. Events
      # caused by secrets.GITHUB_TOKEN are suppressed by GitHub, so the review
      # matrix would never fire without this.
      - name: Mint post-agent GitHub App token
        id: app_token_post
        if: ${{ success() && env.SHOPFLOOR_HAS_APP == 'true' && steps.precheck.outputs.skip != 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Reconfigure git remote with App token for push
        if: ${{ success() && steps.app_token_post.outputs.token != '' && steps.precheck.outputs.skip != 'true' }}
        env:
          APP_TOKEN: ${{ steps.app_token_post.outputs.token }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO_SLUG}.git"
      - name: Push impl commits
        if: success() && steps.precheck.outputs.skip != 'true'
        run: git push origin "${{ needs.route.outputs.branch_name }}"
      # The impl PR was opened as a draft so nothing reviews it mid-run. Now
      # that the agent has finished and the final commits are pushed, mark it
      # ready for review. This fires `pull_request.ready_for_review`, which
      # the state machine translates into stage=review and fans out to the
      # review matrix. The push above ALSO fires `pull_request.synchronize`,
      # but the state machine skips synchronize events on still-draft PRs, so
      # that one is a noop. Using the App token here (not GITHUB_TOKEN) is
      # critical: events caused by GITHUB_TOKEN are suppressed and would
      # never trigger the downstream review workflow.
      - name: Mark impl PR ready for review
        if: ${{ success() && steps.app_token_post.outputs.token != '' && steps.precheck.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app_token_post.outputs.token }}
          PR_NUMBER: ${{ steps.open_pr.outputs.pr_number }}
          REPO_SLUG: ${{ github.repository }}
        run: gh pr ready "$PR_NUMBER" --repo "$REPO_SLUG"
      - name: Finalize progress comment
        if: always() && steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: finalize-progress-comment
          github_token: ${{ steps.app_token_post.outputs.token || secrets.GITHUB_TOKEN }}
          comment_id: ${{ steps.progress.outputs.comment_id }}
          terminal_state: ${{ job.status == 'success' && 'success' || 'failure' }}
          final_body: ${{ steps.agent.outputs.structured_output && fromJSON(steps.agent.outputs.structured_output).summary_for_issue_comment || 'Implementation ended with errors.' }}
      - name: Apply impl postwork (update PR, flip labels)
        if: success() && steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: apply-impl-postwork
          github_token: ${{ steps.app_token_post.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          pr_number: ${{ steps.open_pr.outputs.pr_number }}
          pr_title: ${{ fromJSON(steps.agent.outputs.structured_output).pr_title }}
          pr_body: ${{ fromJSON(steps.agent.outputs.structured_output).pr_body }}
          # Every review-stage job is gated on this flag (set by the route
          # job from the SHOPFLOOR_GITHUB_APP_REVIEW_* secrets). Without it,
          # routing to shopfloor:needs-review would strand the issue in
          # permanent review purgatory because no review job would ever
          # fire. The helper short-circuits to impl-in-review in that case.
          has_review_app: ${{ needs.route.outputs.has_review_app }}
      - name: Report failure
        if: failure() && steps.precheck.outputs.skip != 'true'
        uses: ./router
        with:
          helper: report-failure
          # Prefer the post-agent token if minted; fall back to the pre-agent
          # token (still valid unless the agent ran past the 1-hour ceiling);
          # final fallback to GITHUB_TOKEN. Failure reporting does not need to
          # trigger any downstream workflow, so GITHUB_TOKEN is an acceptable
          # last resort here.
          github_token: ${{ steps.app_token_post.outputs.token || steps.app_token_pre.outputs.token || secrets.GITHUB_TOKEN }}
          issue_number: ${{ needs.route.outputs.issue_number }}
          stage: implement
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          target_pr_number: ${{ steps.open_pr.outputs.pr_number }}

  review-skip-check:
    needs: route
    # The entire review chain is gated on the secondary review App because
    # every review body is posted via its installation token. Without that
    # second App, REQUEST_CHANGES / APPROVE on Shopfloor's own PRs would 403
    # (GitHub forbids self-reviews). Callers opt in to agent reviews by
    # configuring shopfloor_github_app_review_client_id +
    # shopfloor_github_app_review_private_key; otherwise impl PRs un-draft
    # and wait for a human reviewer.
    if: needs.route.outputs.stage == 'review' && needs.route.outputs.has_review_app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - id: check
        uses: ./router
        with:
          helper: check-review-skip
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          pr_number: ${{ needs.route.outputs.impl_pr_number }}

  review-compliance:
    needs: [route, review-skip-check]
    if: needs.route.outputs.stage == 'review' && needs.review-skip-check.outputs.skip == 'false' && inputs.review_compliance_enabled && needs.route.outputs.has_review_app == 'true'
    # SHA-scoped so duplicate review events (synchronize + ready_for_review
    # on the same push) cancel each other; different SHAs run independently
    # and aggregateReview's in-helper analysedSha drift check handles stale
    # SHAs. Replaces the earlier shopfloor-implement-<issue> shared group.
    concurrency:
      group: shopfloor-review-compliance-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.review_timeout_minutes }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      SHOPFLOOR_HAS_APP: ${{ secrets.shopfloor_github_app_client_id != '' && secrets.shopfloor_github_app_private_key != '' }}
    outputs:
      structured_output: ${{ steps.agent.outputs.structured_output }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/pull/${{ needs.route.outputs.impl_pr_number }}/head
          fetch-depth: 0
          # Prevent actions/checkout from installing an http extraheader
          # credential using GITHUB_TOKEN. With read-only caller perms the
          # extraheader has no write scope and, because it overrides the
          # x-access-token embedded in our git remote URL, downstream App-
          # token pushes would 403.
          persist-credentials: false
      - name: Mint GitHub App token
        id: app_token
        if: ${{ env.SHOPFLOOR_HAS_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.shopfloor_github_app_client_id }}
          private-key: ${{ secrets.shopfloor_github_app_private_key }}
      - name: Build review context
        id: ctx
        env:
          PR_NUMBER: ${{ needs.route.outputs.impl_pr_number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          DIFF=$(git diff "origin/${BASE_REF}...HEAD" | head -c 200000 || echo "")
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" | tr '\n' ',' | sed 's/,$//')
          jq -n \
            --arg repo_owner "$REPO_OWNER" \
            --arg repo_name "$REPO_NAME" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "${PR_TITLE:-}" \
            --arg pr_body "${PR_BODY:-}" \
            --arg diff "$DIFF" \
            --arg changed_files "$CHANGED" \
            --arg plan_file_contents "" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg iteration_count "${{ needs.route.outputs.review_iteration }}" \
            --arg previous_review_comments_json "[]" \
            '{repo_owner: $repo_owner, repo_name: $repo_name, pr_number: $pr_number, pr_title: $pr_title, pr_body: $pr_body, diff: $diff, changed_files: $changed_files, plan_file_contents: $plan_file_contents, issue_body: $issue_body, iteration_count: $iteration_count, previous_review_comments_json: $previous_review_comments_json}' \
            > "$RUNNER_TEMP/context.json"
          echo "path=$RUNNER_TEMP/context.json" >> "$GITHUB_OUTPUT"
      - name: Render compliance prompt
        id: prompt
        uses: ./router
        with:
          helper: render-prompt
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          prompt_file: prompts/review-compliance.md
          context_file: ${{ steps.ctx.outputs.path }}
          base_allowed_tools: "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git show:*),WebFetch,${{ env.SHOPFLOOR_COMMON_TOOLS }}"
      - id: agent
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1.0.88 -- pinned; v1.0.89+ bug: anthropics/claude-code-action#1205
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          # The Shopfloor GitHub App is the actor that triggers downstream
          # stages, so every claude-code-action invocation past triage sees a
          # Bot actor. Allow all bots so the action does not refuse to run.
          allowed_bots: "*"
          prompt: ${{ steps.prompt.outputs.rendered }}
          display_report: ${{ inputs.display_report }}
          plugin_marketplaces: ${{ env.SHOPFLOOR_PLUGIN_MARKETPLACES }}
          claude_args: |
            --model ${{ inputs.review_compliance_model }}
            --effort ${{ inputs.review_compliance_effort }}
            --max-turns ${{ inputs.review_compliance_max_turns }}
            --allowedTools "${{ steps.prompt.outputs.allowed_tools }}"
            --disallowedTools "${{ env.SHOPFLOOR_DISALLOWED_TOOLS }}"
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["clean","issues_found"]},"summary":{"type":"string"},"comments":{"type":"array","items":{"type":"object","properties":{"path":{"type":"string"},"line":{"type":"integer"},"side":{"type":"string","enum":["LEFT","RIGHT"]},"start_line":{"type":"integer"},"start_side":{"type":"string","enum":["LEFT","RIGHT"]},"body":{"type":"string"},"confidence":{"type":"integer"},"category":{"type":"string"}},"required":["path","line","side","body","confidence","category"]}}},"required":["verdict","summary","comments"]}'

