name: Shopfloor Router
description: Core dispatcher for the Shopfloor reusable workflow. Resolves the stage or invokes a helper.
inputs:
  helper:
    description: 'Which helper to run: route (default), bootstrap-labels, open-stage-pr, advance-state, report-failure, handle-merge, create-progress-comment, finalize-progress-comment, check-review-skip, aggregate-review'
    required: false
    default: route
  github_token:
    description: GitHub token
    required: true
outputs:
  stage:
    description: 'Resolved stage'
  issue_number:
    description: 'Issue number in context'
  complexity:
    description: 'Complexity label, if set'
  branch_name:
    description: 'Branch name to create/use'
  spec_file_path:
    description: 'Spec file path'
  plan_file_path:
    description: 'Plan file path'
  revision_mode:
    description: 'Whether this is a revision run'
  review_iteration:
    description: 'Current review iteration counter'
  impl_pr_number:
    description: 'Implementation PR number, when relevant'
  reason:
    description: 'Why the router returned this decision'
runs:
  using: node20
  main: dist/index.cjs
