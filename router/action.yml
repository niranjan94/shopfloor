name: Shopfloor Router
description: Core dispatcher for the Shopfloor reusable workflow. Resolves the stage or invokes a helper.
inputs:
  helper:
    description: "Which helper to run: route (default), bootstrap-labels, open-stage-pr, advance-state, report-failure, handle-merge, create-progress-comment, finalize-progress-comment, check-review-skip, aggregate-review, render-prompt, apply-triage-decision, apply-impl-postwork, precheck-stage, build-revision-context"
    required: false
    default: route
  github_token:
    description: GitHub token
    required: true
  review_github_token:
    description: "Optional token used by aggregate-review for the createReview call. When the primary github_token identity is the PR author (always true when Shopfloor mints from a single App), this must be a token from a DIFFERENT identity (typically a second GitHub App installation token) or GitHub will 422 REQUEST_CHANGES / APPROVE. Falls back to github_token when unset."
    required: false
  trigger_label:
    description: "Optional label that an issue must carry before Shopfloor will enter the pipeline. Leave empty to run on every new issue."
    required: false
  review_only:
    description: "When 'true', routing uses resolveReviewOnly (for non-shopfloor human PRs) instead of the issue-centric state machine. Used by shopfloor-review.yml."
    required: false
    default: ""

  # open-stage-pr inputs
  issue_number:
    { description: "Issue number the helper operates on", required: false }
  stage:
    { description: "Stage for open-stage-pr / report-failure", required: false }
  branch_name: { description: "Branch name for open-stage-pr", required: false }
  base_branch: { description: "Base branch for open-stage-pr", required: false }
  pr_title:
    {
      description: "PR title for open-stage-pr / apply-impl-postwork",
      required: false,
    }
  pr_body:
    {
      description: "PR body for open-stage-pr / apply-impl-postwork",
      required: false,
    }
  review_iteration:
    { description: "Review iteration for open-stage-pr", required: false }
  draft: { description: "Whether to open PR as draft", required: false }

  # advance-state inputs
  from_labels:
    { description: "Comma-separated labels to remove", required: false }
  to_labels: { description: "Comma-separated labels to add", required: false }

  # report-failure inputs
  run_url: { description: "Workflow run URL", required: false }
  target_pr_number:
    { description: "PR number to post the failure comment on", required: false }

  # handle-merge inputs
  merged_stage:
    { description: "Merged stage (spec|plan|implement)", required: false }

  # create/finalize-progress-comment inputs
  pr_number: { description: "PR number", required: false }
  comment_id: { description: "Progress comment id", required: false }
  terminal_state: { description: "success or failure", required: false }
  final_body: { description: "Final progress body", required: false }

  # precheck-stage and aggregate-review inputs
  analysed_sha:
    {
      description: "For precheck-stage and aggregate-review: the PR HEAD SHA the review matrix analysed. Both helpers exit no-op if the PR has since advanced.",
      required: false,
    }

  # aggregate-review inputs
  confidence_threshold:
    {
      description: "Minimum confidence for review comments (0-100)",
      required: false,
    }
  max_iterations: { description: "Max review iterations", required: false }
  compliance_output:
    {
      description: "Compliance reviewer structured output JSON",
      required: false,
    }
  bugs_output:
    { description: "Bugs reviewer structured output JSON", required: false }
  security_output:
    { description: "Security reviewer structured output JSON", required: false }
  smells_output:
    { description: "Smells reviewer structured output JSON", required: false }
  workflow_run_url:
    { description: "Workflow run URL for status target_url", required: false }

  # render-prompt inputs
  prompt_file: { description: "Path to prompt template file", required: false }
  context_json:
    {
      description: "JSON object of placeholder -> value substitutions",
      required: false,
    }
  context_file:
    {
      description: "Path to a JSON file with placeholder -> value substitutions (alternative to context_json)",
      required: false,
    }
  base_allowed_tools:
    description: "Comma-separated base allowed tools; merged with project .claude/settings.json permissions.allow"
    required: false
  settings_file:
    description: "Path to .claude/settings.json (defaults to .claude/settings.json at repo root)"
    required: false

  # apply-triage-decision inputs
  decision_json:
    { description: "Structured triage output JSON", required: false }

  # build-revision-context inputs
  spec_file_path:
    description: "For build-revision-context: spec file path to compose into spec_source"
    required: false
  plan_file_path:
    description: "For build-revision-context: plan file path to read into plan_file_contents"
    required: false
  progress_comment_id:
    description: "For build-revision-context: progress comment id to thread through to the agent"
    required: true
  bash_allowlist:
    description: "For build-revision-context: bash allowlist to pass to the agent"
    required: true
  repo_owner:
    description: "For build-revision-context: repository owner login"
    required: false
  repo_name:
    description: "For build-revision-context: repository name"
    required: false
  output_path:
    description: "For build-revision-context: absolute path to write the resulting context.json"
    required: false
  prompt_fragment_path:
    description: "For build-revision-context: path to the prompt fragment template (defaults to prompts/implement-revision-fragment.md)"
    required: false

outputs:
  stage:
    description: "Resolved stage"
  issue_number:
    description: "Issue number in context"
  complexity:
    description: "Complexity label, if set"
  branch_name:
    description: "Branch name to create/use"
  spec_file_path:
    description: "Spec file path"
  plan_file_path:
    description: "Plan file path"
  revision_mode:
    description: "Whether this is a revision run"
  review_iteration:
    description: "Current review iteration counter"
  impl_pr_number:
    description: "Implementation PR number, when relevant"
  reason:
    description: "Why the router returned this decision"
  pr_number:
    description: "Opened PR number"
  pr_url:
    description: "Opened PR URL"
  comment_id:
    description: "Created comment id"
  skip:
    description: "Whether check-review-skip says skip"
  rendered:
    description: "Rendered prompt content"
  allowed_tools:
    description: "Merged allowed tools list (base + project settings.allow)"
  next_label:
    description: "Next-state label applied by apply-impl-postwork"
  skip_reason:
    description: "Reason the review was skipped, if applicable"
  created_labels:
    description: "JSON array of labels created by bootstrap-labels"
runs:
  using: node24
  main: dist/index.cjs
